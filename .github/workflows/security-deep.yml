name: Security CI (Deep)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL extended
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Set up Go for CodeQL build-mode (CodeQL requires compiling Go to
      # analyze it). Version kept in sync with ci.yml via env.
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.9"
          cache: true

      - uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          # Repo composition: ~210 Go files, ~12 JS files, ~9 Python.
          # CodeQL 'javascript' language covers both JS and TS.
          languages: go, javascript
          # Path filters + query suite live in
          # .github/codeql/codeql-config.yml so the Default Setup
          # and the workflow stay in sync.
          config-file: ./.github/codeql/codeql-config.yml

      # Autobuild handles Go module resolution and compilation for CodeQL
      # tracing. No .NET project exists, so the dotnet build scaffolding
      # has been removed.
      - uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2

      - uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with: { category: "codeql" }

  semgrep:
    name: Semgrep wide packs
    runs-on: ubuntu-latest
    # Semgrep CLI v1.x respects inline `// nosemgrep:rule-id` comments
    # AND .semgrepignore globs. The legacy semgrep-action@v0.58 (2021)
    # did not, which is why we switched to direct CLI invocation.
    container:
      image: returntocorp/semgrep:1.140.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: Semgrep scan
        env:
          # Optional — empty when SEMGREP_APP_TOKEN isn't set (forks, etc.).
          # The CLI mode does not require a token to run rule packs.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          # --error: exit non-zero only when blocking findings remain
          # --severity ERROR: don't fail on warnings/notes (legacy
          #                   broke the build on every "info" hit)
          # --sarif --output: emit SARIF for GHAS upload below
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/docker \
            --config p/kubernetes \
            --config p/ci \
            --severity ERROR \
            --error \
            --sarif --output semgrep.sarif \
            --metrics off
      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: always()
        with: { sarif_file: semgrep.sarif }

  trivy_fs:
    name: Trivy FS (deep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — SHA-pinned post GHSA-69fq-xp46-6x23
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,config,license,secret"
      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: always()
        with: { sarif_file: trivy-fs.sarif }

  terrascan:
    name: Terrascan (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Terrascan
        run: |
          V="1.18.1"
          curl -sSL "https://github.com/tenable/terrascan/releases/download/v${V}/terrascan_${V}_Linux_x86_64.tar.gz" -o /tmp/ts.tgz
          tar -xzf /tmp/ts.tgz -C /tmp && sudo mv /tmp/terrascan /usr/local/bin/terrascan
          terrascan version
      - name: Guard — detect Terraform files
        id: guard
        run: |
          # Use `find` instead of shell-expanded glob: `git ls-files "**/*.tf"`
          # does not reliably expand in non-interactive shells.
          if find . -name '*.tf' -not -path './vendor/*' -not -path './node_modules/*' -print -quit | grep -q . ; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
            echo "Terraform files detected — Terrascan will run."
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Terraform files found — skipping Terrascan."
          fi
      - name: Terrascan init
        # IMPORTANT: the output is a string, compare to the string 'true'.
        # Previous code used `!= true` which compared string to boolean and
        # always evaluated to true, defeating the guard.
        if: steps.guard.outputs.has_tf == 'true'
        run: terrascan init
      - name: Terrascan scan
        if: steps.guard.outputs.has_tf == 'true'
        run: |
          terrascan scan -t terraform -i terraform -o sarif > terrascan.sarif || true
      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        # Only upload when the scan ran AND produced a non-empty SARIF file.
        if: steps.guard.outputs.has_tf == 'true' && hashFiles('terrascan.sarif') != ''
        with: { sarif_file: terrascan.sarif }

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # gitleaks-action@v2 breaking change: requires GITHUB_TOKEN to scan PRs.
          # https://github.com/gitleaks/gitleaks-action#-announcement
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --no-color --redact --report-format sarif --report-path gitleaks.sarif
      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        # Guard with hashFiles: when gitleaks finds no secrets OR hits an early
        # exit, the SARIF file may not exist and upload would fail loudly.
        if: always() && hashFiles('gitleaks.sarif') != ''
        with: { sarif_file: gitleaks.sarif }
