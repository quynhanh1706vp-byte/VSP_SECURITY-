name: CI/CD — VSP Security Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25.9"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: sudo apt-get install -y libpcap-dev

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

# ── Job 2: Unit + Integration Tests ───────────────────────────────────────
  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp_test
          POSTGRES_DB: vsp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: sudo apt-get install -y libpcap-dev

      - name: Unit tests (race detector)
        run: go test -race -count=1 -timeout=120s ./...

      - name: Apply migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          goose -dir internal/migrate/sql postgres \
            "postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable" up

      - name: Integration tests — store
        env:
          TEST_DATABASE_URL: postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable
        run: go test -tags integration,containers -count=1 -timeout=300s ./internal/store/...

      - name: Integration tests — API
        env:
          TEST_DATABASE_URL: postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
        run: go test -tags integration -count=1 -timeout=120s ./internal/integration/...

      - name: Build all binaries
        run: |
          go build ./cmd/gateway
          go build ./cmd/scanner

# ── Job 3: Security Scan ───────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: sudo apt-get install -y libpcap-dev

      - name: govulncheck — CVE scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec — SAST (fail on HIGH)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence high \
            -exclude=G104,G304,G307,G204,G703,G704,G108,G118,G702,G402 \
            ./...

      - name: gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 4: UI Checks ──────────────────────────────────────────────────────
  ui-check:
    name: UI Security & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check innerHTML XSS — no unescaped API data
        run: |
          echo "=== Checking for unsafe innerHTML patterns ==="
          # Check for dangerous patterns (API data directly in innerHTML)
          UNSAFE=$(python3 - << 'PYEOF'
          import re, sys
          dangerous_kw = [
            "f.message","f.title","f.rule_id",".message",".reason",
            "e.message","ctrl.title","ctrl.id","f.severity","f.tool"
          ]
          escape_kw = ["_esc","_e6","_escErr","textContent","&amp;"]
          with open("static/index.html") as f:
              lines = f.readlines()
          issues = []
          for i, line in enumerate(lines, 1):
              if "innerHTML" not in line: continue
              if line.strip().startswith("//"): continue
              if any(kw in line for kw in dangerous_kw):
                  if not any(x in line for x in escape_kw):
                      issues.append(f"L{i}: {line.strip()[:120]}")
          for issue in issues:
              print(issue)
          allowed = 5  # SEC-006 debt, tracked in VSP_42 audit item #5

          if len(issues) > allowed:

              print(f"XSS check regression: {len(issues)} > allowed {allowed}")

              sys.exit(1)

          else:

              print(f"XSS check: {len(issues)} known issues (within allowed={allowed})")

              sys.exit(0)
          PYEOF
          )
          echo "XSS check passed ✓"

      - name: Check localStorage token — no raw token storage
        run: |
          echo "=== Checking localStorage token usage ==="
          # Ensure comment about httpOnly cookie migration is present
          grep -n "httpOnly cookie\|cookie handles auth\|localStorage.*bridge\|phase" \
            static/index.html | head -5
          echo "Cookie migration check passed ✓"

      - name: Check CSP header in middleware
        run: |
          grep -q "Content-Security-Policy" internal/api/middleware/csp.go && \
            echo "CSP header present ✓" || \
            (echo "CSP MISSING!" && exit 1)
          grep -q "HttpOnly" internal/api/handler/auth.go && \
            echo "httpOnly cookie present ✓" || \
            (echo "httpOnly cookie MISSING!" && exit 1)

      - name: Check SSRF validation present
        run: |
          grep -q "validateScanURL" internal/api/handler/runs.go && \
            echo "SSRF validation in runs.go ✓" || \
            (echo "SSRF validation MISSING in runs.go!" && exit 1)
          grep -q "validateScanURL" internal/api/handler/scheduler.go && \
            echo "SSRF validation in scheduler.go ✓" || \
            (echo "SSRF validation MISSING in scheduler.go!" && exit 1)

      - name: Check password minimum length
        run: |
          grep -q "< 12\|MinLength.*12\|minLength.*12" \
            internal/api/handler/users.go internal/api/handler/password.go && \
            echo "Password minLength=12 ✓" || \
            (echo "Password minLength check FAILED!" && exit 1)

      - name: Check no hardcoded bypass tokens
        run: |
          if grep -rn "vsp-internal-dashboard\|bypass-auth\|skip-jwt" \
              internal/ cmd/ --include="*.go" | grep -v "_test\|//"; then
            echo "HARDCODED BYPASS TOKEN FOUND!" && exit 1
          fi
          echo "No hardcoded bypass tokens ✓"

      - name: Check DB queries have LIMIT
        run: |
          python3 - << 'PYEOF'
          import subprocess, sys
          result = subprocess.run(
              ["grep", "-rn", "pool.Query", "internal/store/"],
              capture_output=True, text=True
          )
          no_limit = []
          for line in result.stdout.strip().split("\n"):
              if "_test" in line or "QueryRow" in line or not line.strip():
                  continue
              fname = line.split(":")[0]
              lineno = int(line.split(":")[1])
              try:
                  with open(fname) as f:
                      all_lines = f.readlines()
                  snippet = "".join(all_lines[max(0,lineno-5):lineno+20])
                  is_bounded = any(k in snippet for k in ["LIMIT","COUNT(","GROUP BY","SUM(","OFFSET"])
                  if not is_bounded:
                      no_limit.append(f"{fname}:{lineno}")
              except:
                  pass
          if no_limit:
              print("Queries missing LIMIT:")
              for l in no_limit:
                  print(f"  {l}")
              sys.exit(1)
          print(f"All DB queries have LIMIT ✓")
          PYEOF

# ── Job 5: Migration Validation ───────────────────────────────────────────
  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp_test
          POSTGRES_DB: vsp_migrate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Migration up
        run: |
          goose -dir internal/migrate/sql postgres \
            "postgres://vsp:vsp_test@localhost:5432/vsp_migrate_test?sslmode=disable" up

      - name: Migration rollback test
        run: |
          DSN="postgres://vsp:vsp_test@localhost:5432/vsp_migrate_test?sslmode=disable"
          goose -dir internal/migrate/sql postgres "$DSN" down
          goose -dir internal/migrate/sql postgres "$DSN" up
          echo "Migration rollback test passed ✓"

# ── Job 6: Docker Build ────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test, security, ui-check, migrations]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize image name
        id: image
        run: |
          NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9._/-]/-/g' | sed 's/-$//')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ── Job 6b: Trivy Container Scan + SBOM ───────────────────────────────────
  trivy:
    name: Trivy — container scan + SBOM
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — vulnerability scan (CRITICAL+HIGH → fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Attach SBOM to GitHub release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cdx.json

# ── Job 7: Deploy Staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [docker, trivy]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.STAGING_ENABLED == 'true'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run migrations on staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          goose -dir internal/migrate/sql postgres "$DATABASE_URL" up
          goose -dir internal/migrate/sql postgres "$DATABASE_URL" status

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/vsp
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose up -d --no-deps gateway
            sleep 5
            curl -sf http://localhost:8921/health || \
              (docker compose logs gateway --tail=50 && exit 1)
            echo "✓ Staging deployment successful"

# ── Job 8: DAST — Nuclei scan ──────────────────────────────────────────────
  dast:
    name: DAST — Nuclei scan
    runs-on: ubuntu-latest
    needs: [docker]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.STAGING_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run Nuclei DAST scan
        uses: projectdiscovery/nuclei-action@v2
        with:
          target: ${{ vars.STAGING_URL }}
          flags: >-
            -severity critical,high,medium
            -tags owasp,xss,sqli,ssrf,auth,jwt
            -exclude-tags dos
            -rate-limit 50
            -timeout 10
          output: nuclei-results.txt

      - name: Upload Nuclei results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-nuclei-results
          path: nuclei-results.txt
          retention-days: 30
