name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp_test
          POSTGRES_DB: vsp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/auth/... ./internal/gate/... ./internal/api/handler/... -count=1 -timeout=60s

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-test-secret-32-bytes-long-ok!
        run: go test ./internal/integration/... -tags=integration -count=1 -timeout=120s -v

      - name: go build
        run: go build ./...

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vsp-platform:${{ github.sha }} .
      - name: Test container starts
        run: |
          docker run --rm -d --name vsp-test \
            -e DATABASE_URL=postgres://vsp:vsp@host.docker.internal:5432/vsp_go \
            -e REDIS_ADDR=host.docker.internal:6379 \
            -e JWT_SECRET=ci-test-secret-32bytes \
            -p 8921:8921 \
            vsp-platform:${{ github.sha }} || true
