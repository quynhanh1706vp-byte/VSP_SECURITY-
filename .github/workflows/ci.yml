name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp_test
          POSTGRES_DB: vsp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: Unit tests (race detector)
        run: go test -race -count=1 -timeout=120s ./...
      - name: Apply migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          goose -dir internal/migrate/sql postgres \
            "postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable" up
      - name: Integration tests store
        env:
          TEST_DATABASE_URL: postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable
        run: go test -tags integration -count=1 -timeout=300s ./internal/store/...
      - name: Integration tests API
        env:
          TEST_DATABASE_URL: postgres://vsp:vsp_test@localhost:5432/vsp_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-test-secret-32-bytes-long-ok!
        run: go test -tags integration -count=1 -timeout=120s ./internal/integration/...
      - name: go build
        run: go build ./cmd/gateway && go build ./cmd/scanner

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -confidence medium ./... || true

  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp_test
          POSTGRES_DB: vsp_migrate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Migration up
        run: |
          goose -dir internal/migrate/sql postgres \
            "postgres://vsp:vsp_test@localhost:5432/vsp_migrate_test?sslmode=disable" up
      - name: Migration down + up rollback test
        run: |
          DSN="postgres://vsp:vsp_test@localhost:5432/vsp_migrate_test?sslmode=disable"
          goose -dir internal/migrate/sql postgres "$DSN" down
          goose -dir internal/migrate/sql postgres "$DSN" up

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, security, migrations]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sanitize image name
        id: image
        run: |
          NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._/-]/-/g' | sed 's/-$//')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.STAGING_ENABLED == 'true'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Run migrations on staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          goose -dir internal/migrate/sql postgres "$DATABASE_URL" up
          goose -dir internal/migrate/sql postgres "$DATABASE_URL" status
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/vsp
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose up -d --no-deps gateway
            sleep 5
            curl -sf http://localhost:8921/health || (docker compose logs gateway --tail=50 && exit 1)
