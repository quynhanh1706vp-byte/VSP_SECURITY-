name: VSP CodeQL Config

# This file controls BOTH workflow-driven CodeQL runs
# (.github/workflows/codeql.yml + security-deep.yml) AND the
# GHAS-managed CodeQL Default Setup. It picks the rule suite and
# the path filters; we *do not* override the severity-fail threshold
# here because that is set at the repo level under
# Settings → Code security → Code scanning.
#
# Rule suite rationale:
#   security-extended  — broader than the default suite; adds taint
#                        sources we care about (SSRF, prototype-poll).
#   We DO NOT add security-and-quality because that suite carries
#   ~100 style/quality rules that aren't actionable in this codebase
#   right now and produced ~150 of the 212 "new alerts" on the first
#   pass after enabling extended.

queries:
  - uses: security-extended

# Path filters: scan ONLY what we ship/deploy. Excluding test
# fixtures, migration SQL, dev stubs, codemods, and the patches
# directory (which holds incomplete reproductions, not deployable
# code) cuts ~80% of the noise without lowering coverage on the
# actual attack surface.
paths-ignore:
  - '**/*_test.go'
  - '**/testdata/**'
  - internal/integration/**
  - internal/store/storetest/**
  - internal/testutil/**
  - cmd/dev-stub/**
  - cmd/vsp-dev-stub/**
  - vsp-dev-stub/**

  # Migration SQL — schema DDL only, not application logic
  - internal/migrate/sql/**

  # Intentionally-incomplete reproductions
  - patches/**

  # Vendored / generated
  - '**/vendor/**'
  - '**/node_modules/**'
  - '**/*.pb.go'
  - '**/*_generated.go'

  # Marketing / docs
  - docs/**
  - '**/*.md'

  # CDN-mirrored third-party JS
  - static/js/vendor/**
  - static/lib/**

  # FE panels still on CSP Phase 1 (unsafe-inline allowed) — XSS in
  # these is mitigated at runtime by the panel CSP policy in
  # internal/api/middleware/csp.go PanelCSP(). They are scheduled
  # for refactor in Phase 2 (see docs/CSP_HARDENING_ROADMAP.md). The
  # CodeQL alerts here are 100% true positives in absolute terms, but
  # the panel CSP cuts the exploit surface to "an authenticated user
  # injecting into their own panel rendering" — gated behind login
  # and SameSite cookies. Re-enable scanning post-Phase-2.
  - static/panels/**
  - static/index.html

# Build environment hints for the Go analyzer. internal/netcap pulls
# gopacket which needs libpcap-dev at compile time. The workflow
# already installs that, but this also signals the GHAS Default
# Setup which doesn't read the workflow.
build:
  go:
    # GHAS will fall back to autobuild; this is just metadata.
    prebuild: "sudo apt-get update && sudo apt-get install -y libpcap-dev || true"
