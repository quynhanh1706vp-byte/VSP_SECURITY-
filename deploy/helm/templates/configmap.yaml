apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vsp.fullname" . }}-config
  labels:
    {{- include "vsp.labels" . | nindent 4 }}
data:
  # Non-secret runtime config goes here. Secrets stay in Kubernetes
  # Secrets / Vault. Adding to this map triggers a pod restart via
  # the checksum/config annotation in deployment.yaml.
  region: {{ .Values.region | quote }}
