apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: vsp-require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: |
      Refuse pods without CPU + memory limits. Without limits, a
      runaway container can starve every other workload on the node
      — the noisy-neighbour failure mode VSP's HPA cannot mitigate.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-cpu-memory-limits
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "Containers must declare CPU + memory limits."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
                  requests:
                    memory: "?*"
                    cpu: "?*"
