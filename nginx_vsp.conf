# ================================================================
# VSP Go Enterprise — Nginx Reverse Proxy Configuration
# Production: replace your-domain.com với domain thật
# ================================================================

upstream vsp_gateway {
    server 127.0.0.1:8921;
    keepalive 64;
}

upstream vsp_shell {
    server 127.0.0.1:8922;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=vsp_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=vsp_login:10m rate=5r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name vsp.your-domain.com;
    return 301 https://$server_name$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name vsp.your-domain.com;

    # SSL (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/vsp.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vsp.your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

    # Timeouts for long-running scans
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # ── API Gateway (:8921) ──────────────────────────────────
    location /api/ {
        limit_req zone=vsp_api burst=20 nodelay;

        proxy_pass         http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS — handled by gateway, nginx passes through
    }

    # Stricter rate limit on login endpoint
    location /api/v1/auth/login {
        limit_req zone=vsp_login burst=3 nodelay;
        proxy_pass         http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Prometheus metrics — internal only
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;     # internal network
        deny  all;
        proxy_pass http://vsp_gateway/metrics;
    }

    # Health check — public
    location /health {
        proxy_pass http://vsp_gateway/health;
        access_log off;
    }

    # ── SOC Dashboard (:8922) ───────────────────────────────
    location / {
        proxy_pass         http://vsp_shell;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Cache static assets
        location ~* \.(js|css|png|ico|woff2)$ {
            proxy_pass http://vsp_shell;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # Access log with timing
    access_log /var/log/nginx/vsp_access.log combined;
    error_log  /var/log/nginx/vsp_error.log warn;
}

# ── API-only subdomain (for CI/CD integration) ────────────────
server {
    listen 443 ssl http2;
    server_name api.vsp.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/vsp.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vsp.your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        limit_req zone=vsp_api burst=50 nodelay;
        proxy_pass         http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
