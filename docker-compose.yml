version: "3.9"

services:
  gateway:
    build: .
    ports:
      - "8921:8921"
    environment:
      DATABASE_URL: postgres://vsp:${POSTGRES_PASSWORD:-vsp}@postgres:5432/vsp_go?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-VspRedis2026!}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SERVER_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8922}
    # Packet capture (internal/netcap → gopacket/pcap) needs raw socket access.
    # NET_RAW: AF_PACKET sockets and raw frame reads.
    # NET_ADMIN: put the interface into promiscuous mode.
    # Gateway still runs as non-root (UID 65534) — caps are file-scoped via
    # the kernel, not granted to the user. If the packet-capture feature is
    # disabled at runtime, these caps are unused and harmless.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8921/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vsp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vsp}
      POSTGRES_DB: vsp_go
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsp -d vsp_go"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-VspRedis2026!}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-VspRedis2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
