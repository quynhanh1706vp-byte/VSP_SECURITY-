# .gitleaks.toml — VSP Security Platform
#
# Last updated: 2026-04-20 (Sprint 3.5 hygiene v3 — simplified allowlist)
#
# Change log:
# - 2026-04-20 v1: Removed 2 rotated-key regex allowlists
# - 2026-04-20 v2: Added Anthropic/Stripe/Slack custom rules + regex allowlist
# - 2026-04-20 v3: Simplified — use paths allowlist for all false positives
#   (regex allowlist in gitleaks v8 is finicky with TOML subtable ordering)
#
# Strategy:
# - Custom rules for formats default gitleaks misses (Anthropic, Stripe)
# - Path allowlist for all files known to contain examples/fixtures/placeholders
# - No regex allowlist — keep config simple

[extend]
useDefault = true

# ══════════════════════════════════════════════════════════════════
# Allowlist — files expected to contain examples, fixtures, placeholders,
# OR local development DB connection strings (localhost, test hosts).
# ══════════════════════════════════════════════════════════════════
[allowlist]
description = "VSP — examples, test fixtures, CI configs, dev scripts"

paths = [
    # ── Example/template env files ──
    '''\.env\.example$''',
    '''\.env\.template$''',
    '''\.env\.sample$''',
    '''\.env\.production\.example$''',

    # ── Live env files (NOT tracked by git, but scanner sees working tree) ──
    '''\.env$''',
    '''\.env\.production$''',

    # ── Docs that cite real rule patterns (security docs, OpenAPI examples) ──
    '''static/docs\.html$''',
    '''static/p4_compliance\.html$''',
    '''static/panels/p4_compliance\.html$''',
    '''static/panels/integrations\.html$''',
    '''docs/SECURITY_DECISIONS\.md$''',
    '''docs/.*\.md$''',

    # ── Test files (AWS dummy keys, Stripe test keys, mock secrets) ──
    '''.*_test\.go$''',
    '''testdata/''',
    '''internal/scanner/gitleaks/''',

    # ── CI/CD configs (test DB connection strings: postgres://vsp:vsp_test@localhost) ──
    '''\.github/workflows/.*\.ya?ml$''',
    '''\.github/workflows/.*\.bak.*$''',
    '''\.gitlab-ci\.yml$''',
    '''docker-compose.*\.ya?ml$''',
    '''docker/.*\.ya?ml$''',

    # ── Dev/bootstrap scripts (contain local DB URLs for setup) ──
    '''^setup\.sh$''',
    '''^fix.*\.sh$''',
    '''^phase\d+.*\.sh$''',
    '''^production_hardening\.sh$''',
    '''^upgrade_.*\.sh$''',
    '''^deploy_.*\.(sh|py)$''',
    '''^vsp_.*\.(sh|py|js)$''',

    # ── Go command entrypoints (hardcoded localhost for dev) ──
    '''^cmd/[^/]+/main\.go$''',

    # ── API specs (example connection strings in docs) ──
    '''api/openapi\.ya?ml$''',
    '''config/.*\.ya?ml$''',
]

# No stopwords, no regex allowlist. Keep it simple.
stopwords = []

# ══════════════════════════════════════════════════════════════════
# Custom rules — formats default gitleaks misses
# ══════════════════════════════════════════════════════════════════

[[rules]]
id = "anthropic-api-key"
description = "Anthropic Claude API key"
regex = '''sk-ant-api\d{2}-[A-Za-z0-9_-]{90,}'''
keywords = ["sk-ant-api"]
tags = ["anthropic", "key", "critical"]

[[rules]]
id = "stripe-secret-key-live"
description = "Stripe live secret key (production)"
regex = '''sk_live_[A-Za-z0-9]{24,}'''
keywords = ["sk_live_"]
tags = ["stripe", "key", "critical", "pci"]

[[rules]]
id = "stripe-secret-key-test"
description = "Stripe test secret key"
regex = '''sk_test_[A-Za-z0-9]{24,}'''
keywords = ["sk_test_"]
tags = ["stripe", "key", "test"]

[[rules]]
id = "stripe-webhook-signing-secret"
description = "Stripe webhook signing secret"
regex = '''whsec_[A-Za-z0-9]{32,}'''
keywords = ["whsec_"]
tags = ["stripe", "webhook", "critical"]

[[rules]]
id = "slack-webhook-url-prod"
description = "Slack webhook URL (production format only — T/B ≥ 8 chars)"
regex = '''https://hooks\.slack\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[A-Za-z0-9]{20,}'''
keywords = ["hooks.slack.com"]
tags = ["slack", "webhook"]

[[rules]]
id = "vsp-secret-hex64"
description = "Hex-64 secret (JWT, encryption, session) with assignment"
regex = '''(?i)(jwt_secret|api_key_secret|encryption_key|session_secret|signing_key)\s*[:=]\s*['"]?([a-f0-9]{64})['"]?'''
keywords = ["jwt_secret", "api_key_secret", "encryption_key", "session_secret", "signing_key"]
tags = ["vsp", "secret"]

# Note: postgres-connection-string rule REMOVED in v3.
# It generated 38 false positives (all localhost/test CI fixtures) and the
# regex allowlist workaround proved unreliable. Path allowlist above covers
# the known-safe locations. If future leak detection is needed, add per-rule
# allowlist as: [[rules]] followed by [rules.allowlist] paths = [...].
