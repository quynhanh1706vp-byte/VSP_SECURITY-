id: pb-intl-github-secret-revoke
name: GitHub secret push protection — revoke + remediate
description: When GitHub push protection catches a secret, auto-revoke and notify author
trigger: secret_detected
sev_filter: CRITICAL
enabled: true
tags: [github, secrets, revocation, devsecops]
steps:
  - type: enrich
    name: Identify secret class
    desc: Determine provider for revocation API
    config: |
      classifier: github_secret_class
      providers: [aws, gcp, azure, github_pat, npm, pypi, slack, stripe]
  - type: remediate
    name: Auto-revoke at provider
    desc: Call provider revocation API where supported
    config: |
      revoke_via_provider: true
      aws_role: ${AWS_REVOKE_ROLE}
      gcp_sa: ${GCP_REVOKE_SA}
      github_app_id: ${GITHUB_APP_ID}
      github_private_key: ${GITHUB_APP_KEY}
      stripe_admin_key: ${STRIPE_ADMIN_KEY}
      grace_period_seconds: 0
  - type: block
    name: Block CI checks
    desc: Mark commit + parent branch as failing
    config: |
      provider: github
      action: status_check
      context: vsp/secret-scan
      state: failure
      target_url: "${vsp_url}/findings/${finding.id}"
  - type: ticket
    name: Open GitHub issue
    desc: Issue in repo for tracking remediation
    config: |
      provider: github
      action: create_issue
      repo: ${repo.full_name}
      title: "Secret leak detected: ${secret.type}"
      labels: [security, secret-leak, p1]
      assignee: "${commit.author_login}"
      body_template: github_secret_issue
  - type: notify
    name: DM commit author + sec channel
    desc: Direct message the developer, post to security
    config: |
      provider: slack
      bot_token: ${SLACK_BOT_TOKEN}
      dm_user: "${commit.author_slack}"
      channel: "#security-alerts"
      template: secret_revoked
