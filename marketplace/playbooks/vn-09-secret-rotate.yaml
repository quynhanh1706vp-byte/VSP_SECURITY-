id: pb-vn-secret-rotate
name: Secret leak — rotate + thông báo team
description: Khi gitleaks bắt được secret, rotate credential ngay + thông báo dev
trigger: secret_detected
sev_filter: CRITICAL
enabled: true
tags: [vn, secrets, rotation, devsecops]
steps:
  - type: enrich
    name: Phân loại secret type
    desc: Xác định loại để chọn rotation method
    config: |
      classifier: secret_type
      types: [aws_key, gcp_key, azure_key, jwt_secret, db_password,
              api_token, ssh_key, github_token, gitlab_token]
  - type: block
    name: Block CI pipeline
    desc: Stop deploy ngay, không để secret bị deploy thêm
    config: |
      provider: github
      action: block_status
      context: vsp/secret-leak
      status: failure
      message_vi: "Secret bị lộ — pipeline đã chặn để rotate"
  - type: remediate
    name: Auto-rotate credential
    desc: Quay vòng key qua provider API (chỉ cho aws/gcp/github)
    config: |
      auto_rotate_for: [aws_key, gcp_key, github_token, gitlab_token]
      manual_rotate_for: [db_password, ssh_key]
      aws_role_arn: ${AWS_ROTATION_ROLE}
      gcp_sa_key: ${GCP_ROTATION_SA}
      github_app_id: ${GITHUB_APP_ID}
      preserve_old_key_hours: 1
  - type: ticket
    name: Dev team ticket
    desc: Ticket cho dev — update code + verify deploy
    config: |
      provider: jira
      project: ${repo.team_jira}
      priority: P1
      labels: [secret-leak, rotation-required]
      assignee: ${commit.author_email}
      template_vi: secret_rotation_dev_vi
  - type: notify
    name: Notify dev team Slack
    desc: Mention author + team channel
    config: |
      channel: "${repo.team_channel}"
      webhook_url: ${SLACK_DEVSEC_WEBHOOK}
      ping: ["${commit.author_slack}", "@security-oncall"]
      template_vi: "Secret bị lộ trong commit ${commit.sha} — đã rotate, vui lòng cập nhật code"
