openapi: "3.0.3"
info:
  title: VSP Security Platform API
  version: "1.1.0"
  description: |
    VSP (Vulnerability Scanning Platform) — Enterprise Security API.
    Authentication: Bearer JWT token từ POST /api/v1/auth/login.

    ## Security Notes
    - All endpoints require BearerAuth except /health and /api/v1/auth/login
    - Admin endpoints require role=admin (enforced server-side)
    - Rate limiting: 10 req/min on auth endpoints, 300 req/min elsewhere
    - Password policy: minimum 12 characters (NIST SP 800-63B)
  contact:
    name: VSP Security Team
    email: soc@agency.gov
  license:
    name: Proprietary

servers:
  - url: http://localhost:8921
    description: Development
  - url: https://vsp.agency.gov
    description: Production

security:
  - BearerAuth: []

# ── Global response headers (documented for gateway enforcement) ──────────
x-global-response-headers:
  X-Content-Type-Options: nosniff
  X-Frame-Options: DENY
  Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
  X-Request-ID: "{uuid}"
  Cache-Control: no-store

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    # SEC-009 (2026-04-23): Session cookie for SSE/WS endpoints.
    # Browsers cannot attach Authorization headers to EventSource, so
    # these streams authenticate via the HttpOnly cookie set at login.
    # Query param `?token=` is rejected server-side to prevent token
    # leakage through access logs and Referer headers.
    CookieAuth:
      type: apiKey
      in: cookie
      name: vsp_token
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  # ── Reusable parameters ─────────────────────────────────────────────────
  parameters:
    LimitParam:
      in: query
      name: limit
      schema: { type: integer, default: 50, minimum: 1, maximum: 500 }
      description: "Max items per page. Hard cap: 500"
    OffsetParam:
      in: query
      name: offset
      schema: { type: integer, default: 0, minimum: 0 }

  # ── Reusable response headers ───────────────────────────────────────────
  headers:
    X-RateLimit-Limit:
      schema: { type: integer }
      description: Request limit per window
    X-RateLimit-Remaining:
      schema: { type: integer }
      description: Remaining requests in current window
    X-RateLimit-Reset:
      schema: { type: integer }
      description: Unix timestamp when window resets
    X-Request-ID:
      schema: { type: string, format: uuid }
      description: Unique request identifier for tracing

  # ── Reusable responses ──────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Insufficient role/permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests
      headers:
        X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
        X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
        X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
        Retry-After:
          schema: { type: integer }
          description: Seconds until retry is allowed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body / parameter validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              fields:
                type: object
                additionalProperties: { type: string }

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but lacks permission (RBAC or tenant mismatch)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimit:
      description: Too many requests — client should back off
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until retry is allowed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found OR access denied (returns 404 to prevent enumeration)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        request_id: { type: string, format: uuid }

    # ── FIX: password minLength 8 → 12 (NIST SP 800-63B) ─────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 12      # was: 8 — NIST SP 800-63B requires ≥12
          maxLength: 128
        mfa_code:
          type: string
          pattern: "^[0-9]{6}$"
      additionalProperties: false

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user_id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [admin, analyst, dev, auditor] }
        tenant_id: { type: string, format: uuid }
        expires_at: { type: string, format: date-time }
        mfa_enabled: { type: boolean }

    MFARequired:
      type: object
      properties:
        mfa_required: { type: boolean }
        message: { type: string }

    # ── Health: remove version from public response (info leak) ──────────
    HealthResponse:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded, error] }
        timestamp: { type: string, format: date-time }
        # NOTE: 'version' intentionally omitted from public /health response
        # Expose only to authenticated /api/v1/system/status
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status: { type: string, enum: [ok, degraded, error] }
              latency: { type: string }
              # error field omitted — don't expose internal errors publicly

    # ── FIX: profile enum synced to BE constants ──────────────────────────
    Run:
      type: object
      properties:
        id: { type: string, format: uuid }
        rid: { type: string }
        tenant_id: { type: string, format: uuid }
        mode: { type: string, enum: [SAST, DAST, SCA, SECRETS, IAC, FULL] }
        profile:
          type: string
          enum: [FAST, EXT, AGGR, PREMIUM, FULL, FULL_SOC]  # was: [FAST, STANDARD, DEEP]
        status: { type: string, enum: [QUEUED, RUNNING, DONE, FAILED, CANCELLED] }
        gate: { type: string, enum: [PASS, WARN, FAIL] }
        total_findings: { type: integer }
        score: { type: integer, minimum: 0, maximum: 100 }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    Finding:
      type: object
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        tool: { type: string }
        severity: { type: string, enum: [CRITICAL, HIGH, MEDIUM, LOW, INFO] }
        rule_id: { type: string }
        message: { type: string }
        path: { type: string }
        line_num: { type: integer }
        cwe: { type: string }
        cvss: { type: number, minimum: 0, maximum: 10 }
        fix_signal: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, analyst, dev, auditor] }
        mfa_enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        last_login_at: { type: string, format: date-time, nullable: true }

    PaginatedResponse:
      type: object
      required: [total, limit, offset]
      properties:
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1, maximum: 500 }
        offset: { type: integer, minimum: 0 }

    # ── NEW: Webhook with SSRF-safe URL validation ────────────────────────
    WebhookRequest:
      type: object
      required: [label, type, url]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [slack, teams, generic]
        url:
          type: string
          format: uri
          # Block private/internal IP ranges (SSRF prevention)
          # Enforcement is BE-side; this documents the contract
          not:
            pattern: >-
              ^https?://(localhost|127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|169\.254\.|::1|0\.0\.0\.0)
          description: >
            HTTPS URL to external webhook endpoint.
            Private/loopback/link-local addresses are rejected server-side.
          example: "https://hooks.slack.com/services/T00/B00/xxx"
        min_sev:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM]
          default: HIGH
      additionalProperties: false

paths:
  # ── System ───────────────────────────────────────────────────────────────
  /health:
    get:
      summary: Health check (public)
      description: |
        Returns system health. Intentionally omits version and internal
        error details to prevent information disclosure.
      security: []
      tags: [System]
      responses:
        "200":
          description: Healthy
          headers:
            X-Request-ID: { $ref: "#/components/headers/X-Request-ID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        "503":
          description: Unhealthy — one or more checks failed

  # ── Auth ─────────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      summary: Login
      description: |
        Rate limited: 10 requests/minute per IP.
        After 5 failed attempts, account is locked for 15 minutes.
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful or MFA required
          headers:
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-Request-ID: { $ref: "#/components/headers/X-Request-ID" }
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginResponse"
                  - $ref: "#/components/schemas/MFARequired"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "423":
          description: Account temporarily locked (too many failed attempts)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/auth/logout:
    post:
      summary: Logout — invalidate current token
      tags: [Auth]
      responses:
        "200": { description: Logged out — token invalidated server-side }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/refresh:
    post:
      summary: Refresh JWT token
      description: |
        Issues a new short-lived token. Old token is invalidated.
        Rate limited: 30 requests/minute.
      tags: [Auth]
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/auth/password/change:
    post:
      summary: Change password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  minLength: 12    # was: 8
                  maxLength: 128
                new_password:
                  type: string
                  minLength: 12    # was: 8 — enforce same policy
                  maxLength: 128
                  description: "Must differ from current password. Min 12 chars (NIST SP 800-63B)"
                mfa_code:
                  type: string
                  pattern: "^[0-9]{6}$"
              additionalProperties: false
      responses:
        "200": { description: Password changed successfully }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { description: Wrong current password or invalid MFA }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/auth/mfa/setup:
    post:
      summary: Setup MFA — generate TOTP secret
      tags: [Auth]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  provisioning_uri: { type: string }
                  # qr_code: base64 PNG (optional, generated server-side)
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/mfa/verify:
    post:
      summary: Verify TOTP code and enable MFA
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
              additionalProperties: false
      responses:
        "200": { description: MFA enabled successfully }
        "400": { description: Invalid or expired TOTP code }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  # ── Scans ─────────────────────────────────────────────────────────────────
  /api/v1/vsp/run:
    post:
      summary: Trigger a scan
      description: |
        Queues a new scan run. Requires analyst or admin role.
        `src` is validated server-side — only whitelisted paths/URLs allowed.
      tags: [Scans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [SAST, DAST, SCA, SECRETS, IAC, FULL]
                profile:
                  type: string
                  enum: [FAST, EXT, AGGR, PREMIUM, FULL, FULL_SOC]  # was: [FAST, STANDARD, DEEP]
                  default: FAST
                src:
                  type: string
                  maxLength: 500
                  description: "Path or URL to scan. Validated server-side against allowlist."
              additionalProperties: false
      responses:
        "202":
          description: Scan queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }
                  rid: { type: string }
                  status: { type: string, enum: [QUEUED] }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/vsp/runs:
    get:
      summary: List scan runs (paginated)
      tags: [Scans]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - in: query
          name: status
          schema: { type: string, enum: [QUEUED, RUNNING, DONE, FAILED, CANCELLED] }
        - in: query
          name: gate
          schema: { type: string, enum: [PASS, WARN, FAIL] }
      responses:
        "200":
          description: Paginated runs list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      runs:
                        type: array
                        items: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Findings ──────────────────────────────────────────────────────────────
  /api/v1/vsp/findings:
    get:
      summary: List findings (paginated)
      tags: [Findings]
      parameters:
        - in: query
          name: severity
          schema: { type: string, enum: [CRITICAL, HIGH, MEDIUM, LOW, INFO] }
        - in: query
          name: tool
          schema: { type: string, maxLength: 50 }
        - in: query
          name: run_id
          schema: { type: string, format: uuid }
        - in: query
          name: q
          schema:
            type: string
            maxLength: 200
            description: "Search in message, rule_id, path"
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500   # was: 2000 — reduced to prevent DoS
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated findings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items: { $ref: "#/components/schemas/Finding" }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Admin ─────────────────────────────────────────────────────────────────
  /api/v1/admin/users:
    get:
      summary: List users
      description: |
        **Requires role: admin**
        Returns paginated user list for the current tenant.
        Non-admin callers receive 403.
      tags: [Admin]
      # Explicit role enforcement documented (enforced server-side)
      x-required-role: admin
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      users:
                        type: array
                        items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create user
      description: |
        **Requires role: admin**
        Creates a new user within the current tenant.
      tags: [Admin]
      x-required-role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                password:
                  type: string
                  minLength: 12    # was: 8
                  maxLength: 128
                  description: "Min 12 chars. User must change on first login."
                role:
                  type: string
                  enum: [admin, analyst, dev, auditor]
              additionalProperties: false
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── SIEM ──────────────────────────────────────────────────────────────────
  /api/v1/correlation/incidents:
    get:
      summary: List security incidents
      tags: [SIEM]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [open, resolved, all] }
          default: open
        - in: query
          name: severity
          schema: { type: string, enum: [CRITICAL, HIGH, MEDIUM, LOW] }
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Incidents list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      incidents:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            title: { type: string }
                            severity: { type: string }
                            status: { type: string }
                            created_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/siem/webhooks:
    get:
      summary: List SIEM webhooks
      tags: [SIEM]
      responses:
        "200":
          description: Webhooks list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        label: { type: string }
                        type: { type: string }
                        # url intentionally masked: "https://hooks.slack.com/***"
                        url_masked: { type: string }
                        min_sev: { type: string }
                        active: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create SIEM webhook
      description: |
        Registers a new outbound webhook for alert delivery.
        URL is validated server-side: must be HTTPS, no private/loopback IPs (SSRF prevention).
      tags: [SIEM]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookRequest" }
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  label: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422":
          description: URL failed SSRF validation (private IP / loopback detected)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/v1/events:
    get:
      summary: Server-Sent Events stream (scan_complete, incident_created, anomaly)
      description: |
        Live event stream for the UI. Authenticates via the `vsp_token`
        HttpOnly cookie set at login.

        **SEC-009 (2026-04-23):** The legacy `?token=<JWT>` query parameter
        is no longer accepted by the auth middleware. Clients must use
        `new EventSource(url, { withCredentials: true })` so the browser
        attaches the session cookie. Missing cookie returns 401.
      tags: [SIEM]
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Event stream opened
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited events. Each `data:` payload is JSON
                  with a `type` field: `scan_complete`, `incident_created`,
                  `incident`, or `anomaly`.
        "401": { description: Missing or invalid session cookie }


tags:
  - name: System
    description: Health check, metrics
  - name: Auth
    description: Authentication, MFA, password management
  - name: Scans
    description: Scan run management
  - name: Findings
    description: Security findings (read-only)
  - name: Admin
    description: "User management — requires role: admin"
  - name: SIEM
    description: Security incidents, webhooks, correlation rules
