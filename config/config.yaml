server:
  gateway_port: 8921
  scanner_port: 8921
  shell_port:   8922
  read_timeout:  30s
  write_timeout: 60s
  env: development
  allowed_origins: "http://localhost:3000,http://localhost:8922,http://127.0.0.1:8922,http://127.0.0.1:8921"

database:
  url: postgres://vsp:vsp@localhost:5432/vsp_go?sslmode=disable
  max_conns: 20
  min_conns: 2

auth:
  jwt_secret: "${JWT_SECRET}"  # set via env: export JWT_SECRET=<your-secret>VspRedis2026!"
integrations:
  slack_webhook: "${{ SLACK_WEBHOOK }}"  # set via env
  jira_url: "https://your-org.atlassian.net"
  jira_token: "${{ JIRA_TOKEN }}"  # set via env
  jira_project: "VSP-SECURITY"
  github_token: "${{ GITHUB_TOKEN }}"  # set via env
  github_repo: "your-org/your-repo"
  pagerduty_key: "${{ PAGERDUTY_KEY }}"  # set via env

smtp:
  host: "smtp.gmail.com"
  port: 587
  user: "vsp-alerts@agency.gov"
  pass: ""  # set via env SMTP_PASSWORD
  from: "VSP Security Platform <vsp-alerts@agency.gov>"
  to:   ["soc@agency.gov", "ciso@agency.gov"]
  enabled: false

anthropic:
  api_key: "sk-ant-..."

