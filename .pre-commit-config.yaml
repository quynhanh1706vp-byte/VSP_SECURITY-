repos:
  # ── Go formatting ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

  # ── Secret scanning ────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks — secret scan
        description: Detect secrets before commit

  # ── General hygiene ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        types: [go, yaml, json]
      - id: end-of-file-fixer
        types: [go, yaml]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
        name: detect private keys
