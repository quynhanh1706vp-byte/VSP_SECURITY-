<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>VSP — Scheduler</title>
<style>
:root{--bg:#0a0c10;--bg2:#111318;--surface:#1e2128;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--t1:#e8eaf0;--t2:#9aa3b8;--t3:#5a6278;--t4:#3a3f52;--red:#ef4444;--red2:rgba(239,68,68,.12);--amber:#f59e0b;--amber2:rgba(245,158,11,.12);--green:#22c55e;--green2:rgba(34,197,94,.12);--blue:#3b82f6;--blue2:rgba(59,130,246,.12);--cyan:#06b6d4;--cyan2:rgba(6,182,212,.12);--purple:#8b5cf6;--purple2:rgba(139,92,246,.12);--font-mono:'JetBrains Mono','Fira Mono',monospace;--font-ui:'Inter','Segoe UI',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}body{background:var(--bg);color:var(--t1);font-family:var(--font-ui);line-height:1.5;padding:16px}
.pill{display:inline-block;font-size:10px;font-family:var(--font-mono);padding:2px 6px;border-radius:3px;font-weight:600;border:1px solid transparent}
.pill-red{background:var(--red2);color:var(--red);border-color:rgba(239,68,68,.3)}.pill-amber{background:var(--amber2);color:var(--amber);border-color:rgba(245,158,11,.3)}.pill-green{background:var(--green2);color:var(--green);border-color:rgba(34,197,94,.3)}.pill-blue{background:var(--blue2);color:var(--blue);border-color:rgba(59,130,246,.3)}.pill-gray{background:rgba(255,255,255,.06);color:var(--t2);border-color:var(--border2)}.pill-cyan{background:var(--cyan2);color:var(--cyan);border-color:rgba(6,182,212,.3)}
.btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--t1);cursor:pointer;transition:background .15s}.btn:hover{background:var(--surface)}.btn-sm{padding:3px 8px;font-size:10px}.btn-primary{background:var(--blue2);border-color:rgba(59,130,246,.4);color:var(--blue)}.btn-danger{background:var(--red2);border-color:rgba(239,68,68,.4);color:var(--red)}.btn-run{background:var(--green2);border-color:rgba(34,197,94,.4);color:var(--green)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}.card-title{font-size:12px;font-weight:600}.card-sub{font-size:11px;color:var(--t3);margin-top:1px}.card-body{padding:12px 14px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px}.kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.kpi-val{font-size:20px;font-weight:700;font-family:var(--font-mono)}.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.sched-item{border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:10px;transition:all .15s;position:relative}
.sched-item:hover{border-color:var(--border2);background:rgba(255,255,255,.01)}
.sched-item.enabled{border-left:3px solid var(--green)}
.sched-item.disabled{border-left:3px solid var(--t4);opacity:.7}
.sched-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sched-name{font-size:13px;font-weight:600;flex:1}
.sched-cron{font-size:10px;font-family:var(--font-mono);color:var(--cyan);background:var(--cyan2);padding:2px 7px;border-radius:4px}
.sched-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px;font-size:11px;color:var(--t3)}
.sched-actions{display:flex;gap:6px;margin-top:8px}
.toggle{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}.toggle.off{background:var(--t4)}
.toggle::after{content:'';position:absolute;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:17px}.toggle.off::after{left:3px}
.next-badge{font-size:10px;font-family:var(--font-mono);color:var(--amber);background:var(--amber2);padding:1px 6px;border-radius:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-start;justify-content:center;padding-top:32px;overflow-y:auto}.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:min(560px,95vw);margin-bottom:32px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}.modal-title{font-size:14px;font-weight:700}.modal-body{padding:14px 18px}.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}.modal-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px}
.form-group{margin-bottom:10px}.form-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.form-ctrl{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--t1);padding:7px 10px;border-radius:6px;font-size:12px;font-family:var(--font-ui);outline:none;transition:border-color .15s}.form-ctrl:focus{border-color:var(--blue)}
select.form-ctrl option{background:var(--bg2)}
.cron-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.cron-preset{padding:7px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all .15s}
.cron-preset:hover,.cron-preset.active{border-color:var(--blue);background:var(--blue2);color:var(--blue)}
.cron-preset .cp-name{font-weight:600;margin-bottom:1px}
.cron-preset .cp-cron{font-size:9px;font-family:var(--font-mono);color:var(--t3)}
.run-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px}
.run-row:last-child{border-bottom:none}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr h2{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.hdr p{font-size:11px;color:var(--t3);font-family:var(--font-mono)}
.spinner{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--green);animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hdr">
  <div><h2>Scan scheduler</h2><p>Automated scan schedules · cron expressions · run history</p></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" onclick="loadSchedules()">&#8635; Refresh</button>
    <button class="btn btn-primary btn-sm" onclick="openNewSchedule()">+ New schedule</button>
  </div>
</div>
<div class="kpi-row">
  <div class="kpi"><div class="kpi-lbl">Total schedules</div><div class="kpi-val" style="color:var(--cyan)" id="k-total">—</div><div class="kpi-sub">configured</div></div>
  <div class="kpi"><div class="kpi-lbl">Active</div><div class="kpi-val" style="color:var(--green)" id="k-active">—</div><div class="kpi-sub">enabled</div></div>
  <div class="kpi"><div class="kpi-lbl">Next run</div><div class="kpi-val" style="color:var(--amber);font-size:14px" id="k-next">—</div><div class="kpi-sub">upcoming</div></div>
  <div class="kpi"><div class="kpi-lbl">Last run</div><div class="kpi-val" style="color:var(--t2);font-size:14px" id="k-last">—</div><div class="kpi-sub">completed</div></div>
</div>
<div class="card">
  <div class="card-head">
    <div><div class="card-title">Schedules</div><div class="card-sub" id="sched-sub">—</div></div>
    <div style="display:flex;gap:6px">
      <select id="mode-filter" class="btn btn-sm" style="cursor:pointer" onchange="renderSchedules()">
        <option value="">All modes</option><option value="SAST">SAST</option><option value="IAC">IAC</option><option value="SCA">SCA</option><option value="SECRETS">Secrets</option>
      </select>
    </div>
  </div>
  <div class="card-body" id="sched-list" style="padding:10px 12px"></div>
</div>
<div class="card">
  <div class="card-head"><div><div class="card-title">Recent runs</div><div class="card-sub" id="runs-sub">—</div></div><button class="btn btn-sm" onclick="loadRecentRuns()">&#8635;</button></div>
  <div style="padding:8px 14px" id="runs-list"></div>
</div>
<!-- New schedule modal -->
<div class="modal-overlay" id="sched-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="smod-title">New schedule</div><button class="modal-close" onclick="closeModal('sched-modal')">&#10005;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Schedule name</label><input class="form-ctrl" id="s-name" placeholder="e.g. Daily production scan"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><label class="form-label">Scan mode</label>
          <select class="form-ctrl" id="s-mode">
            <option value="SAST">SAST — Static analysis</option>
            <option value="IAC">IAC — Infrastructure</option>
            <option value="SCA">SCA — Dependencies</option>
            <option value="SECRETS">Secrets scanning</option>
            <option value="FULL">Full scan (all)</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Profile</label>
          <select class="form-ctrl" id="s-profile">
            <option value="FAST">FAST — Quick scan</option>
            <option value="STANDARD">STANDARD</option>
            <option value="THOROUGH">THOROUGH — Deep scan</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Cron expression</label>
        <div class="cron-presets" id="cron-presets"></div>
        <input class="form-ctrl" id="s-cron" placeholder="0 2 * * *" style="font-family:var(--font-mono)">
        <div style="font-size:10px;color:var(--t3);margin-top:4px" id="cron-explain">Enter a cron expression or select a preset above</div>
      </div>
      <div class="form-group"><label class="form-label">Target (path or URL)</label><input class="form-ctrl" id="s-src" placeholder="/home/user/project or https://github.com/org/repo"></div>
      <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input class="form-ctrl" id="s-tags" placeholder="production, nightly, critical"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('sched-modal')">Cancel</button>
      <button class="btn btn-primary" id="smod-save-btn" onclick="saveSchedule()">Create schedule &#8594;</button>
    </div>
  </div>
</div>
<!-- Run now confirm modal -->
<div class="modal-overlay" id="run-modal">
  <div class="modal" style="width:min(420px,95vw)">
    <div class="modal-head"><div class="modal-title">Run schedule now</div><button class="modal-close" onclick="closeModal('run-modal')">&#10005;</button></div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px" id="run-confirm-text"></div>
      <div style="background:var(--surface);border-radius:7px;padding:10px 12px;font-size:11px;font-family:var(--font-mono);color:var(--cyan)" id="run-confirm-detail"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('run-modal')">Cancel</button>
      <button class="btn btn-run" id="run-confirm-btn">&#9654; Run now</button>
    </div>
  </div>
</div>
<script>
var TOKEN='',API='';
var SCHEDULES=[],_editId=null;
var CRON_PRESETS=[
  {name:'Every hour',    cron:'0 * * * *',  desc:'At minute 0'},
  {name:'Daily 02:00',   cron:'0 2 * * *',  desc:'Every day 2am UTC'},
  {name:'Daily 06:00',   cron:'0 6 * * *',  desc:'Every day 6am UTC'},
  {name:'Twice daily',   cron:'0 2,14 * * *',desc:'2am and 2pm UTC'},
  {name:'Weekly Mon',    cron:'0 3 * * 1',  desc:'Monday 3am UTC'},
  {name:'Monthly 1st',   cron:'0 4 1 * *',  desc:'1st of month 4am'},
];
var SAMPLE_SCHEDS=[
  {id:'sc1',name:'Daily production scan',mode:'SAST',profile:'STANDARD',cron:'0 2 * * *',src:'/home/test/Data/GOLANG_VSP',enabled:true,tags:['production','nightly'],next_run:'02:00 UTC',last_run:'yesterday 02:00',last_status:'DONE',last_gate:'FAIL'},
  {id:'sc2',name:'IAC infrastructure check',mode:'IAC',profile:'FAST',cron:'0 6 * * *',src:'/home/test/Data/GOLANG_VSP',enabled:true,tags:['infra','daily'],next_run:'06:00 UTC',last_run:'today 06:00',last_status:'DONE',last_gate:'WARN'},
  {id:'sc3',name:'Weekly deep scan',mode:'FULL',profile:'THOROUGH',cron:'0 3 * * 1',src:'/home/test/Data/GOLANG_VSP',enabled:true,tags:['weekly','thorough'],next_run:'Mon 03:00',last_run:'last Mon',last_status:'DONE',last_gate:'FAIL'},
  {id:'sc4',name:'Secrets scan (disabled)',mode:'SECRETS',profile:'FAST',cron:'0 12 * * *',src:'/home/test/Data/GOLANG_VSP',enabled:false,tags:['secrets'],next_run:'—',last_run:'3d ago',last_status:'DONE',last_gate:'PASS'},
];
var RECENT_RUNS=[
  {rid:'RID_SCHED_20260402_020013',sched:'Daily production scan',status:'DONE',gate:'FAIL',findings:104,dur:'29:51',ts:'today 02:00'},
  {rid:'RID_SCHED_20260402_060008',sched:'IAC infrastructure check',status:'DONE',gate:'WARN',findings:13,dur:'4:22',ts:'today 06:00'},
  {rid:'RID_SCHED_20260401_020011',sched:'Daily production scan',status:'DONE',gate:'FAIL',findings:97,dur:'28:44',ts:'yesterday 02:00'},
  {rid:'RID_SCHED_20260401_060004',sched:'IAC infrastructure check',status:'DONE',gate:'PASS',findings:0,dur:'3:58',ts:'yesterday 06:00'},
  {rid:'RID_SCHED_20260331_030022',sched:'Weekly deep scan',status:'DONE',gate:'FAIL',findings:112,dur:'47:13',ts:'Mon 03:00'},
];
SCHEDULES=SAMPLE_SCHEDS;

function gateColor(g){return {PASS:'var(--green)',WARN:'var(--amber)',FAIL:'var(--red)'}[g]||'var(--t3)';}
function gateBadge(g){var m={PASS:'pill-green',WARN:'pill-amber',FAIL:'pill-red'};return '<span class="pill '+(m[g]||'pill-gray')+'">'+( g||'—')+'</span>';}
function cronDescribe(c){
  var p=CRON_PRESETS.find(function(x){return x.cron===c;});
  if(p)return p.name+' ('+p.desc+')';
  return c;
}

function renderSchedules(){
  var mf=document.getElementById('mode-filter').value;
  var list=SCHEDULES.filter(function(s){return !mf||s.mode===mf;});
  document.getElementById('k-total').textContent=SCHEDULES.length;
  document.getElementById('k-active').textContent=SCHEDULES.filter(function(s){return s.enabled;}).length;
  var next=SCHEDULES.filter(function(s){return s.enabled&&s.next_run!=='—';});
  document.getElementById('k-next').textContent=next.length?next[0].next_run:'—';
  document.getElementById('k-last').textContent=RECENT_RUNS.length?RECENT_RUNS[0].ts:'—';
  document.getElementById('sched-sub').textContent=list.length+' schedules';
  document.getElementById('sched-list').innerHTML=list.map(function(s,idx){
    return '<div class="sched-item '+(s.enabled?'enabled':'disabled')+'">'
      +'<div class="sched-hdr">'
      +'<button class="toggle '+(s.enabled?'on':'off')+'" onclick="toggleSched('+idx+')" title="'+(s.enabled?'Disable':'Enable')+'"></button>'
      +'<span class="sched-name">'+s.name+'</span>'
      +'<span class="pill pill-blue">'+s.mode+'</span>'
      +'<span class="pill pill-gray">'+s.profile+'</span>'
      +'</div>'
      +'<div class="sched-meta">'
      +'<span class="sched-cron">'+s.cron+'</span>'
      +'<span>'+cronDescribe(s.cron)+'</span>'
      +(s.enabled?'<span class="next-badge">next: '+s.next_run+'</span>':'')
      +'</div>'
      +'<div style="font-size:10px;color:var(--t3);font-family:var(--font-mono);margin-bottom:6px">'+s.src+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
      +'<span style="font-size:10px;color:var(--t3)">Last run: '+s.last_run+'</span>'
      +gateBadge(s.last_gate)
      +(s.tags||[]).map(function(t){return '<span class="pill pill-gray" style="font-size:9px">'+t+'</span>';}).join('')
      +'</div>'
      +'<div class="sched-actions">'
      +'<button class="btn btn-run btn-sm" onclick="runNow('+idx+')">&#9654; Run now</button>'
      +'<button class="btn btn-sm" onclick="editSchedule('+idx+')">&#9998; Edit</button>'
      +'<button class="btn btn-danger btn-sm" onclick="deleteSchedule('+idx+')">&#10005; Delete</button>'
      +'</div></div>';
  }).join('');
}

function renderRecentRuns(){
  document.getElementById('runs-sub').textContent=RECENT_RUNS.length+' recent runs';
  document.getElementById('runs-list').innerHTML=RECENT_RUNS.map(function(r){
    return '<div class="run-row">'
      +'<span style="font-family:var(--font-mono);font-size:10px;color:var(--t3);width:200px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis">'+r.rid.slice(-20)+'</span>'
      +'<span style="flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.sched+'</span>'
      +gateBadge(r.gate)
      +'<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:48px;text-align:right">'+r.findings+' f</span>'
      +'<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:44px;text-align:right">'+r.dur+'</span>'
      +'<span style="font-size:10px;color:var(--t3);width:100px;text-align:right;flex-shrink:0">'+r.ts+'</span>'
      +'</div>';
  }).join('');
}

// FIX 1: Thêm tham số idx vào map callback — biến idx trước đây không được khai báo
function renderCronPresets(){
  document.getElementById('cron-presets').innerHTML=CRON_PRESETS.map(function(p,idx){
    return '<div class="cron-preset" onclick="selectPreset('+idx+')">'
      +'<div class="cp-name">'+p.name+'</div>'
      +'<div class="cp-cron">'+p.cron+'</div>'
      +'</div>';
  }).join('');
}

function selectPreset(idx){
  var cron=CRON_PRESETS[idx]?CRON_PRESETS[idx].cron:idx;
  document.getElementById('s-cron').value=cron;
  document.querySelectorAll('.cron-preset').forEach(function(el){
    el.classList.toggle('active', el.querySelector('.cp-cron').textContent===cron);
  });
  var p=CRON_PRESETS.find(function(x){return x.cron===cron;});
  document.getElementById('cron-explain').textContent=p?p.name+' — '+p.desc:'Custom expression';
}

function toggleSched(idx){
  var s=SCHEDULES[idx];var id=s&&s.id||'';
  if(!s)return;
  s.enabled=!s.enabled;
  if(!s.enabled)s.next_run='—';
  renderSchedules();
  if(TOKEN)fetch(API+'/api/v1/schedules/'+id+'/toggle',{method:'PATCH',headers:{Authorization:'Bearer '+TOKEN}}).catch(function(){});
}

function runNow(idx){
  var s=SCHEDULES[idx];var id=s&&s.id||'';if(!s)return;
  document.getElementById('run-confirm-text').textContent='This will immediately trigger a scan using the schedule configuration. The run will appear in the Runs list.';
  document.getElementById('run-confirm-detail').textContent='Schedule: '+s.name+' | Mode: '+s.mode+' | Profile: '+s.profile+' | Target: '+s.src;
  document.getElementById('run-confirm-btn').onclick=function(){
    closeModal('run-modal');
    if(TOKEN){
      fetch(API+'/api/v1/schedules/'+id+'/run',{method:'POST',headers:{Authorization:'Bearer '+TOKEN}})
        .then(function(r){return r.json();})
        .then(function(d){
          var newRun={rid:d.rid||'RID_MANUAL_'+Date.now(),sched:s.name,status:'QUEUED',gate:'—',findings:0,dur:'—',ts:'just now'};
          RECENT_RUNS.unshift(newRun);
          renderRecentRuns();
        }).catch(function(){});
    } else {
      RECENT_RUNS.unshift({rid:'RID_MANUAL_'+Date.now(),sched:s.name,status:'QUEUED',gate:'—',findings:0,dur:'—',ts:'just now'});
      renderRecentRuns();
    }
  };
  document.getElementById('run-modal').classList.add('open');
}

function openNewSchedule(){
  _editId=null;
  document.getElementById('smod-title').textContent='New schedule';
  document.getElementById('smod-save-btn').textContent='Create schedule →';
  document.getElementById('s-name').value='';
  document.getElementById('s-cron').value='0 2 * * *';
  document.getElementById('s-src').value='';
  document.getElementById('s-tags').value='';
  document.getElementById('cron-explain').textContent='Every day at 02:00 UTC';
  renderCronPresets();
  selectPreset(1); // index 1 = 'Daily 02:00'
  document.getElementById('sched-modal').classList.add('open');
}

function editSchedule(idx){
  var s=SCHEDULES[idx];var id=s&&s.id||'';if(!s)return;
  _editId=id;
  document.getElementById('smod-title').textContent='Edit: '+s.name;
  document.getElementById('smod-save-btn').textContent='Save changes →';
  document.getElementById('s-name').value=s.name;
  document.getElementById('s-mode').value=s.mode;
  document.getElementById('s-profile').value=s.profile;
  document.getElementById('s-cron').value=s.cron;
  document.getElementById('s-src').value=s.src;
  document.getElementById('s-tags').value=(s.tags||[]).join(', ');
  renderCronPresets();
  var presetIdx=CRON_PRESETS.findIndex(function(p){return p.cron===s.cron;});
  if(presetIdx>=0)selectPreset(presetIdx);
  document.getElementById('sched-modal').classList.add('open');
}

function saveSchedule(){
  var name=document.getElementById('s-name').value.trim();
  if(!name){document.getElementById('s-name').focus();return;}
  var payload={
    name:name,
    mode:document.getElementById('s-mode').value,
    profile:document.getElementById('s-profile').value,
    cron:document.getElementById('s-cron').value||'0 2 * * *',
    src:document.getElementById('s-src').value.trim()||'/home/test/Data/GOLANG_VSP',
    tags:document.getElementById('s-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),
    enabled:true,
  };
  if(_editId){
    var s=SCHEDULES.find(function(x){return x.id===_editId;});
    if(s) Object.assign(s,payload);
    if(TOKEN)fetch(API+'/api/v1/schedules/'+_editId,{method:'PATCH',headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  } else {
    var newS=Object.assign({id:'sc'+Date.now(),next_run:'—',last_run:'never',last_status:'—',last_gate:'—'},payload);
    SCHEDULES.unshift(newS);
    if(TOKEN)fetch(API+'/api/v1/schedules',{method:'POST',headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  }
  closeModal('sched-modal');renderSchedules();
}

// FIX 2: Khai báo biến s và id từ SCHEDULES[idx] trước khi dùng
function deleteSchedule(idx){
  if(!confirm('Delete this schedule?'))return;
  var s=SCHEDULES[idx];var id=s&&s.id||'';if(!s)return;
  SCHEDULES=SCHEDULES.filter(function(x){return x.id!==id;});
  renderSchedules();
  if(TOKEN)fetch(API+'/api/v1/schedules/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+TOKEN}}).catch(function(){});
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

async function loadSchedules(){
  if(!TOKEN)return;
  try{
    var r=await fetch(API+'/api/v1/schedules',{headers:{Authorization:'Bearer '+TOKEN}});
    if(r.ok){
      var d=await r.json();
      if(d.schedules&&d.schedules.length){
        SCHEDULES=d.schedules.map(function(s){
          return Object.assign({next_run:'—',last_run:'—',last_status:'—',last_gate:'—',tags:[]},s);
        });
        renderSchedules();
      }
    }
  }catch(e){}
}

async function loadRecentRuns(){
  if(!TOKEN)return;
  try{
    var r=await fetch(API+'/api/v1/vsp/runs?limit=10',{headers:{Authorization:'Bearer '+TOKEN}});
    if(r.ok){
      var d=await r.json();
      if(d.runs&&d.runs.length){
        RECENT_RUNS=d.runs.map(function(r){
          return {rid:r.rid||r.id,sched:r.schedule_name||'Manual',status:r.status,gate:r.gate||'—',findings:r.total_findings||0,dur:'—',ts:(r.created_at||'').slice(0,16)};
        });
        renderRecentRuns();
      }
    }
  }catch(e){}
}

window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='vsp:token'&&e.data.token&&e.data.token.length>50){
    if(!TOKEN){TOKEN=e.data.token;loadSchedules();loadRecentRuns();}
  }
  if(e.data.type==='vsp:theme')_applyTheme(e.data.theme);
});
if(window.parent!==window)window.parent.postMessage({type:'vsp:request_token'},'*');
function _applyTheme(t){var r=document.documentElement;if(t==='light'){r.style.setProperty('--bg','#f4f5f7');r.style.setProperty('--bg2','#ffffff');r.style.setProperty('--surface','#f0f1f4');r.style.setProperty('--border','rgba(0,0,0,.08)');r.style.setProperty('--t1','#1a1d24');r.style.setProperty('--t2','#4a5068');r.style.setProperty('--t3','#8a90a8');document.body.style.background='#f4f5f7';}else{r.style.setProperty('--bg','#0a0c10');r.style.setProperty('--bg2','#111318');r.style.setProperty('--surface','#1e2128');r.style.setProperty('--border','rgba(255,255,255,.07)');r.style.setProperty('--t1','#e8eaf0');r.style.setProperty('--t2','#9aa3b8');r.style.setProperty('--t3','#5a6278');document.body.style.background='#0a0c10';}}
if(window.parent!==window)window.parent.postMessage({type:'vsp:request_theme'},'*');
renderSchedules();renderRecentRuns();
</script>
</body>
