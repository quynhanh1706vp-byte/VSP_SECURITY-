<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>VSP — Scheduler</title>
<style>
:root{--bg:#0a0c10;--bg2:#111318;--surface:#1e2128;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--t1:#e8eaf0;--t2:#9aa3b8;--t3:#5a6278;--t4:#3a3f52;--red:#ef4444;--red2:rgba(239,68,68,.12);--amber:#f59e0b;--amber2:rgba(245,158,11,.12);--green:#22c55e;--green2:rgba(34,197,94,.12);--blue:#3b82f6;--blue2:rgba(59,130,246,.12);--cyan:#06b6d4;--cyan2:rgba(6,182,212,.12);--purple:#8b5cf6;--purple2:rgba(139,92,246,.12);--font-mono:'JetBrains Mono','Fira Mono',monospace;--font-ui:'Inter','Segoe UI',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}body{background:var(--bg);color:var(--t1);font-family:var(--font-ui);line-height:1.5;padding:16px}
.pill{display:inline-block;font-size:10px;font-family:var(--font-mono);padding:2px 6px;border-radius:3px;font-weight:600;border:1px solid transparent}
.pill-red{background:var(--red2);color:var(--red);border-color:rgba(239,68,68,.3)}.pill-amber{background:var(--amber2);color:var(--amber);border-color:rgba(245,158,11,.3)}.pill-green{background:var(--green2);color:var(--green);border-color:rgba(34,197,94,.3)}.pill-blue{background:var(--blue2);color:var(--blue);border-color:rgba(59,130,246,.3)}.pill-gray{background:rgba(255,255,255,.06);color:var(--t2);border-color:var(--border2)}.pill-cyan{background:var(--cyan2);color:var(--cyan);border-color:rgba(6,182,212,.3)}.pill-purple{background:var(--purple2);color:var(--purple);border-color:rgba(139,92,246,.3)}
.btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--t1);cursor:pointer;transition:background .15s}.btn:hover{background:var(--surface)}.btn-sm{padding:3px 8px;font-size:10px}.btn-primary{background:var(--blue2);border-color:rgba(59,130,246,.4);color:var(--blue)}.btn-primary:hover{background:rgba(59,130,246,.2)}.btn-danger{background:var(--red2);border-color:rgba(239,68,68,.4);color:var(--red)}.btn-danger:hover{background:rgba(239,68,68,.2)}.btn-run{background:var(--green2);border-color:rgba(34,197,94,.4);color:var(--green)}.btn-run:hover{background:rgba(34,197,94,.2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}.card-title{font-size:12px;font-weight:600}.card-sub{font-size:11px;color:var(--t3);margin-top:1px}.card-body{padding:12px 14px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;transition:border-color .15s}.kpi:hover{border-color:var(--border2)}.kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.kpi-val{font-size:20px;font-weight:700;font-family:var(--font-mono)}.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.sched-item{border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:10px;transition:all .15s;position:relative}
.sched-item:hover{border-color:var(--border2);background:rgba(255,255,255,.01)}
.sched-item.enabled{border-left:3px solid var(--green)}.sched-item.disabled{border-left:3px solid var(--t4);opacity:.65}
.sched-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sched-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sched-cron{font-size:10px;font-family:var(--font-mono);color:var(--cyan);background:var(--cyan2);padding:2px 7px;border-radius:4px;white-space:nowrap}
.sched-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px;font-size:11px;color:var(--t3)}
.sched-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.toggle{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;outline:none}
.toggle.on{background:var(--green)}.toggle.off{background:var(--t4)}
.toggle::after{content:'';position:absolute;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:17px}.toggle.off::after{left:3px}
.next-badge{font-size:10px;font-family:var(--font-mono);color:var(--amber);background:var(--amber2);padding:1px 6px;border-radius:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-start;justify-content:center;padding-top:32px;overflow-y:auto}.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:min(560px,95vw);margin-bottom:32px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}.modal-title{font-size:14px;font-weight:700}.modal-body{padding:14px 18px}.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}.modal-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .15s}.modal-close:hover{color:var(--t1)}
.form-group{margin-bottom:10px}.form-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.form-label .req{color:var(--red);font-size:11px}
.form-ctrl{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--t1);padding:7px 10px;border-radius:6px;font-size:12px;font-family:var(--font-ui);outline:none;transition:border-color .15s}.form-ctrl:focus{border-color:var(--blue)}.form-ctrl.error{border-color:var(--red)}
select.form-ctrl option{background:var(--bg2)}
.cron-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.cron-preset{padding:7px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all .15s;user-select:none}
.cron-preset:hover,.cron-preset.active{border-color:var(--blue);background:var(--blue2);color:var(--blue)}
.cron-preset .cp-name{font-weight:600;margin-bottom:1px}
.cron-preset .cp-cron{font-size:9px;font-family:var(--font-mono);color:var(--t3)}
.cron-preset.active .cp-cron{color:var(--blue)}
.run-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:11px;transition:background .1s;cursor:pointer}.run-row:hover{background:var(--surface)}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr h2{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.hdr p{font-size:11px;color:var(--t3);font-family:var(--font-mono)}
.spinner{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--green);animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.search-bar{background:var(--bg);border:1px solid var(--border2);color:var(--t1);padding:5px 10px;border-radius:6px;font-size:11px;font-family:var(--font-ui);outline:none;transition:border-color .15s;width:160px}.search-bar:focus{border-color:var(--blue)}.search-bar::placeholder{color:var(--t4)}
.empty-state{text-align:center;padding:32px 16px;color:var(--t3)}.empty-state .emo{font-size:28px;margin-bottom:8px}.empty-state p{font-size:12px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:999;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:var(--green2);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.toast-error{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-running{animation:pulse 1.2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr 1fr}.cron-presets{grid-template-columns:1fr 1fr}.sched-hdr{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="hdr">
  <div><h2>⏱ Scan Scheduler</h2><p>Automated scan schedules · cron expressions · run history</p></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" onclick="loadSchedules()">↻ Refresh</button>
    <button class="btn btn-primary btn-sm" onclick="openNewSchedule()">+ New schedule</button>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi"><div class="kpi-lbl">Total schedules</div><div class="kpi-val" style="color:var(--cyan)" id="k-total">—</div><div class="kpi-sub">configured</div></div>
  <div class="kpi"><div class="kpi-lbl">Active</div><div class="kpi-val" style="color:var(--green)" id="k-active">—</div><div class="kpi-sub">enabled</div></div>
  <div class="kpi"><div class="kpi-lbl">Next run</div><div class="kpi-val" style="color:var(--amber);font-size:14px" id="k-next">—</div><div class="kpi-sub">upcoming</div></div>
  <div class="kpi"><div class="kpi-lbl">Last run</div><div class="kpi-val" style="color:var(--t2);font-size:14px" id="k-last">—</div><div class="kpi-sub">completed</div></div>
</div>

<div class="card">
  <div class="card-head">
    <div><div class="card-title">Schedules</div><div class="card-sub" id="sched-sub">—</div></div>
    <div style="display:flex;gap:6px;align-items:center">
      <input class="search-bar" id="sched-search" placeholder="🔍 Search…" oninput="renderSchedules()">
      <select id="mode-filter" class="btn btn-sm" style="cursor:pointer" onchange="renderSchedules()">
        <option value="">All modes</option>
        <option value="SAST">SAST</option>
        <option value="IAC">IAC</option>
        <option value="SCA">SCA</option>
        <option value="SECRETS">Secrets</option>
        <option value="FULL">Full</option>
      </select>
      <select id="status-filter" class="btn btn-sm" style="cursor:pointer" onchange="renderSchedules()">
        <option value="">All status</option>
        <option value="enabled">Enabled</option>
        <option value="disabled">Disabled</option>
      </select>
    </div>
  </div>
  <div class="card-body" id="sched-list" style="padding:10px 12px"></div>
</div>

<div class="card">
  <div class="card-head">
    <div><div class="card-title">Recent runs</div><div class="card-sub" id="runs-sub">—</div></div>
    <button class="btn btn-sm" onclick="loadRecentRuns()">↻</button>
  </div>
  <div style="padding:4px 8px" id="runs-list"></div>
</div>

<!-- New / Edit schedule modal -->
<div class="modal-overlay" id="sched-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="smod-title">New schedule</div>
      <button class="modal-close" onclick="closeModal('sched-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Schedule name <span class="req">*</span></label>
        <input class="form-ctrl" id="s-name" placeholder="e.g. Daily production scan" maxlength="80">
        <div style="font-size:10px;color:var(--red);margin-top:3px;display:none" id="s-name-err">Name is required</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group">
          <label class="form-label">Scan mode</label>
          <select class="form-ctrl" id="s-mode">
            <option value="SAST">SAST — Static analysis</option>
            <option value="IAC">IAC — Infrastructure</option>
            <option value="SCA">SCA — Dependencies</option>
            <option value="SECRETS">Secrets scanning</option>
            <option value="FULL">Full scan (all)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Profile</label>
          <select class="form-ctrl" id="s-profile">
            <option value="FAST">FAST — 2min quick</option>
            <option value="EXT">EXT — 5min extended</option>
            <option value="AGGR">AGGR — 10min aggressive</option>
            <option value="PREMIUM">PREMIUM — 15min deep</option>
            <option value="FULL">FULL — 20min all tools</option>
            <option value="FULL_SOC">FULL_SOC — 30min max depth</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Cron expression <span class="req">*</span></label>
        <div class="cron-presets" id="cron-presets"></div>
        <input class="form-ctrl" id="s-cron" placeholder="0 2 * * *" style="font-family:var(--font-mono)" oninput="onCronInput()">
        <div style="font-size:10px;color:var(--t3);margin-top:4px" id="cron-explain">Enter a cron expression or select a preset above</div>
      </div>
      <div class="form-group">
        <label class="form-label">Target <span style="color:var(--t4);font-size:9px;text-transform:none">(path or URL)</span></label>
        <input class="form-ctrl" id="s-src" placeholder="/home/test/Data/GOLANG_VSP or https://github.com/org/repo">
      </div>
      <div class="form-group">
        <label class="form-label">Tags <span style="color:var(--t4);font-size:9px;text-transform:none">(comma-separated)</span></label>
        <input class="form-ctrl" id="s-tags" placeholder="production, nightly, critical">
      </div>
      <div class="form-group">
        <label class="form-label" style="cursor:pointer;display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="s-enabled" checked style="accent-color:var(--green)">
          Enable schedule immediately
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('sched-modal')">Cancel</button>
      <button class="btn btn-primary" id="smod-save-btn" onclick="saveSchedule()">Create schedule →</button>
    </div>
  </div>
</div>

<!-- Run now confirm modal -->
<div class="modal-overlay" id="run-modal">
  <div class="modal" style="width:min(420px,95vw)">
    <div class="modal-head">
      <div class="modal-title">Run schedule now</div>
      <button class="modal-close" onclick="closeModal('run-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px" id="run-confirm-text"></div>
      <div style="background:var(--surface);border-radius:7px;padding:10px 12px;font-size:11px;font-family:var(--font-mono);color:var(--cyan);line-height:1.8" id="run-confirm-detail"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('run-modal')">Cancel</button>
      <button class="btn btn-run" id="run-confirm-btn">▶ Run now</button>
    </div>
  </div>
</div>

<!-- Run detail modal -->
<div class="modal-overlay" id="run-detail-modal">
  <div class="modal" style="width:min(480px,95vw)">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="rdd-title">Run detail</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--font-mono)" id="rdd-rid"></div>
      </div>
      <button class="modal-close" onclick="closeModal('run-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="rdd-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('run-detail-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
var TOKEN = '', API = '';
var SCHEDULES = [], RECENT_RUNS = [];
var _editId = null;

var CRON_PRESETS = [
  { name: 'Every hour',   cron: '0 * * * *',    desc: 'At minute 0 of every hour' },
  { name: 'Daily 02:00',  cron: '0 2 * * *',    desc: 'Every day at 02:00 UTC' },
  { name: 'Daily 06:00',  cron: '0 6 * * *',    desc: 'Every day at 06:00 UTC' },
  { name: 'Twice daily',  cron: '0 2,14 * * *', desc: '02:00 and 14:00 UTC' },
  { name: 'Weekly Mon',   cron: '0 3 * * 1',    desc: 'Monday at 03:00 UTC' },
  { name: 'Monthly 1st',  cron: '0 4 1 * *',    desc: '1st of month at 04:00' },
];

var SAMPLE_SCHEDS = [
  { id:'sc1', name:'Daily production scan',    mode:'SAST',    profile:'EXT', cron:'0 2 * * *',    src:'/home/test/Data/GOLANG_VSP', enabled:true,  tags:['production','nightly'], next_run:'02:00 UTC', last_run:'yesterday 02:00', last_status:'DONE', last_gate:'FAIL' },
  { id:'sc2', name:'IAC infrastructure check', mode:'IAC',     profile:'FAST',     cron:'0 6 * * *',    src:'/home/test/Data/GOLANG_VSP', enabled:true,  tags:['infra','daily'],        next_run:'06:00 UTC', last_run:'today 06:00',     last_status:'DONE', last_gate:'WARN' },
  { id:'sc3', name:'Weekly deep scan',         mode:'FULL',    profile:'FULL', cron:'0 3 * * 1',    src:'/home/test/Data/GOLANG_VSP', enabled:true,  tags:['weekly','thorough'],    next_run:'Mon 03:00', last_run:'last Mon',        last_status:'DONE', last_gate:'FAIL' },
  { id:'sc4', name:'Secrets scan (disabled)',   mode:'SECRETS', profile:'FAST',     cron:'0 12 * * *',   src:'/home/test/Data/GOLANG_VSP', enabled:false, tags:['secrets'],              next_run:'—',         last_run:'3d ago',          last_status:'DONE', last_gate:'PASS' },
  { id:'sc5', name:'SCA dependency audit',     mode:'SCA',     profile:'EXT', cron:'0 0 * * 0',    src:'/home/test/Data/GOLANG_VSP', enabled:true,  tags:['deps','weekly'],        next_run:'Sun 00:00', last_run:'last Sun',        last_status:'DONE', last_gate:'WARN' },
];

var SAMPLE_RUNS = [
  { rid:'RID_SCHED_20260402_020013', sched:'Daily production scan',    status:'DONE',   gate:'FAIL', findings:104, dur:'29:51', ts:'today 02:00',      mode:'SAST' },
  { rid:'RID_SCHED_20260402_060008', sched:'IAC infrastructure check', status:'DONE',   gate:'WARN', findings:13,  dur:'4:22',  ts:'today 06:00',      mode:'IAC'  },
  { rid:'RID_SCHED_20260401_020011', sched:'Daily production scan',    status:'DONE',   gate:'FAIL', findings:97,  dur:'28:44', ts:'yesterday 02:00',  mode:'SAST' },
  { rid:'RID_SCHED_20260401_060004', sched:'IAC infrastructure check', status:'DONE',   gate:'PASS', findings:0,   dur:'3:58',  ts:'yesterday 06:00',  mode:'IAC'  },
  { rid:'RID_SCHED_20260331_030022', sched:'Weekly deep scan',         status:'DONE',   gate:'FAIL', findings:112, dur:'47:13', ts:'Mon 03:00',         mode:'FULL' },
  { rid:'RID_SCHED_20260330_000018', sched:'SCA dependency audit',     status:'DONE',   gate:'WARN', findings:28,  dur:'6:14',  ts:'Sun 00:00',         mode:'SCA'  },
];

SCHEDULES = SAMPLE_SCHEDS.slice();
RECENT_RUNS = SAMPLE_RUNS.slice();

// ── Helpers ────────────────────────────────────────────────
function gateBadge(g) {
  var m = { PASS:'pill-green', WARN:'pill-amber', FAIL:'pill-red' };
  return '<span class="pill ' + (m[g] || 'pill-gray') + '">' + (g || '—') + '</span>';
}

function modeBadge(m) {
  var colours = { SAST:'pill-blue', IAC:'pill-cyan', SCA:'pill-purple', SECRETS:'pill-amber', FULL:'pill-gray' };
  return '<span class="pill ' + (colours[m] || 'pill-gray') + '">' + m + '</span>';
}

function cronDescribe(c) {
  var p = CRON_PRESETS.find(function(x){ return x.cron === c; });
  if (p) return p.name + ' — ' + p.desc;
  // Simple human-readable fallback for non-preset crons
  return 'Custom: ' + c;
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + (type || 'success') + ' show';
  setTimeout(function(){ el.className = 'toast'; }, 2800);
}

// ── Render schedules ───────────────────────────────────────
function renderSchedules() {
  var mf = document.getElementById('mode-filter').value;
  var sf = document.getElementById('status-filter').value;
  var q  = (document.getElementById('sched-search').value || '').toLowerCase();

  var list = SCHEDULES.filter(function(s) {
    if (mf && s.mode !== mf) return false;
    if (sf === 'enabled' && !s.enabled) return false;
    if (sf === 'disabled' && s.enabled) return false;
    if (q && s.name.toLowerCase().indexOf(q) === -1 && (s.tags||[]).join(' ').toLowerCase().indexOf(q) === -1) return false;
    return true;
  });

  var enabled = SCHEDULES.filter(function(s){ return s.enabled; });
  document.getElementById('k-total').textContent  = SCHEDULES.length;
  document.getElementById('k-active').textContent = enabled.length;
  var nextArr = enabled.filter(function(s){ return s.next_run && s.next_run !== '—'; });
  document.getElementById('k-next').textContent = nextArr.length ? nextArr[0].next_run : '—';
  document.getElementById('k-last').textContent = RECENT_RUNS.length ? RECENT_RUNS[0].ts : '—';
  document.getElementById('sched-sub').textContent = list.length + ' of ' + SCHEDULES.length + ' schedules';

  if (!list.length) {
    document.getElementById('sched-list').innerHTML =
      '<div class="empty-state"><div class="emo">🗓</div><p>No schedules match the current filters</p></div>';
    return;
  }

  document.getElementById('sched-list').innerHTML = list.map(function(s) {
    // Find original index for mutation
    var origIdx = SCHEDULES.indexOf(s);
    return '<div class="sched-item ' + (s.enabled ? 'enabled' : 'disabled') + '">'
      + '<div class="sched-hdr">'
      + '<button class="toggle ' + (s.enabled ? 'on' : 'off') + '" onclick="toggleSched(' + origIdx + ')" title="' + (s.enabled ? 'Disable' : 'Enable') + '" aria-label="' + (s.enabled ? 'Disable' : 'Enable') + '"></button>'
      + '<span class="sched-name" title="' + s.name + '">' + s.name + '</span>'
      + modeBadge(s.mode)
      + '<span class="pill pill-gray">' + s.profile + '</span>'
      + '</div>'
      + '<div class="sched-meta">'
      + '<span class="sched-cron">' + s.cron + '</span>'
      + '<span>' + cronDescribe(s.cron) + '</span>'
      + (s.enabled && s.next_run !== '—' ? '<span class="next-badge">next: ' + s.next_run + '</span>' : '')
      + '</div>'
      + '<div style="font-size:10px;color:var(--t3);font-family:var(--font-mono);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + s.src + '">' + s.src + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
      + '<span style="font-size:10px;color:var(--t3)">Last: ' + s.last_run + '</span>'
      + gateBadge(s.last_gate)
      + (s.tags||[]).map(function(t){ return '<span class="pill pill-gray" style="font-size:9px">' + t + '</span>'; }).join('')
      + '</div>'
      + '<div class="sched-actions">'
      + '<button class="btn btn-run btn-sm" onclick="runNow(' + origIdx + ')">▶ Run now</button>'
      + '<button class="btn btn-sm" onclick="editSchedule(' + origIdx + ')">✎ Edit</button>'
      + '<button class="btn btn-danger btn-sm" onclick="deleteSchedule(' + origIdx + ')">✕ Delete</button>'
      + '</div></div>';
  }).join('');
}

// ── Render recent runs ─────────────────────────────────────
function renderRecentRuns() {
  document.getElementById('runs-sub').textContent = RECENT_RUNS.length + ' recent runs';
  if (!RECENT_RUNS.length) {
    document.getElementById('runs-list').innerHTML = '<div class="empty-state"><div class="emo">📋</div><p>No runs yet</p></div>';
    return;
  }
  document.getElementById('runs-list').innerHTML = RECENT_RUNS.map(function(r, i) {
    var isQueued = r.status === 'QUEUED';
    return '<div class="run-row" onclick="showRunDetail(' + i + ')" title="Click for details">'
      + '<span style="font-family:var(--font-mono);font-size:10px;color:var(--t3);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis">' + r.rid.slice(-16) + '</span>'
      + '<span style="flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + r.sched + '</span>'
      + (r.mode ? modeBadge(r.mode) : '')
      + (isQueued
          ? '<span class="pill pill-cyan badge-running">QUEUED</span>'
          : gateBadge(r.gate))
      + '<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:48px;text-align:right;flex-shrink:0">' + (r.findings || 0) + 'f</span>'
      + '<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:44px;text-align:right;flex-shrink:0">' + r.dur + '</span>'
      + '<span style="font-size:10px;color:var(--t3);width:100px;text-align:right;flex-shrink:0">' + r.ts + '</span>'
      + '</div>';
  }).join('');
}

// ── Cron presets ───────────────────────────────────────────
function renderCronPresets() {
  // FIX: use (p, idx) so idx is defined
  document.getElementById('cron-presets').innerHTML = CRON_PRESETS.map(function(p, idx) {
    return '<div class="cron-preset" data-idx="' + idx + '" onclick="selectPreset(' + idx + ')">'
      + '<div class="cp-name">' + p.name + '</div>'
      + '<div class="cp-cron">' + p.cron + '</div>'
      + '</div>';
  }).join('');
}

function selectPreset(idx) {
  // idx is always a number here
  if (idx < 0 || idx >= CRON_PRESETS.length) return;
  var preset = CRON_PRESETS[idx];
  document.getElementById('s-cron').value = preset.cron;
  document.querySelectorAll('.cron-preset').forEach(function(el) {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
  document.getElementById('cron-explain').textContent = preset.name + ' — ' + preset.desc;
}

function selectPresetByCron(cron) {
  var idx = CRON_PRESETS.findIndex(function(p){ return p.cron === cron; });
  if (idx >= 0) {
    selectPreset(idx);
  } else {
    document.querySelectorAll('.cron-preset').forEach(function(el){ el.classList.remove('active'); });
    document.getElementById('cron-explain').textContent = cron ? 'Custom expression' : 'Enter a cron expression or select a preset above';
  }
}

function onCronInput() {
  var val = document.getElementById('s-cron').value.trim();
  selectPresetByCron(val);
}

// ── Toggle enable/disable ──────────────────────────────────
function toggleSched(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  s.enabled = !s.enabled;
  if (!s.enabled) s.next_run = '—';
  renderSchedules();
  showToast(s.name + ' ' + (s.enabled ? 'enabled' : 'disabled'), 'success');
  if (TOKEN) {
    fetch(API + '/api/v1/schedules/' + s.id + '/toggle', {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + TOKEN }
    }).catch(function(){});
  }
}

// ── Run now ────────────────────────────────────────────────
function runNow(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  document.getElementById('run-confirm-text').textContent =
    'This will immediately trigger a scan using the schedule configuration. The run will appear in the Runs list.';
  document.getElementById('run-confirm-detail').innerHTML =
    '<b>Schedule:</b> ' + s.name + '<br>'
    + '<b>Mode:</b> ' + s.mode + ' · <b>Profile:</b> ' + s.profile + '<br>'
    + '<b>Target:</b> ' + s.src;

  var btn = document.getElementById('run-confirm-btn');
  btn.onclick = function() {
    closeModal('run-modal');
    var newRun = { rid: 'RID_MANUAL_' + Date.now(), sched: s.name, status: 'QUEUED', gate: '—', findings: 0, dur: '—', ts: 'just now', mode: s.mode };
    RECENT_RUNS.unshift(newRun);
    renderRecentRuns();
    showToast('Scan queued: ' + s.name, 'success');

    if (TOKEN) {
      fetch(API + '/api/v1/schedules/' + s.id + '/run', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + TOKEN }
      }).then(function(r){ return r.json(); })
        .then(function(d){
          if (d && d.rid) { newRun.rid = d.rid; renderRecentRuns(); }
        }).catch(function(){});
    }
  };
  document.getElementById('run-modal').classList.add('open');
}

// ── Run detail modal ───────────────────────────────────────
function showRunDetail(idx) {
  var r = RECENT_RUNS[idx];
  if (!r) return;
  document.getElementById('rdd-title').textContent = r.sched;
  document.getElementById('rdd-rid').textContent = r.rid;
  var gateColor = { PASS:'var(--green)', WARN:'var(--amber)', FAIL:'var(--red)' };
  document.getElementById('rdd-body').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
    + _kpi('Status', r.status || '—', 'var(--cyan)')
    + _kpi('Gate', r.gate || '—', gateColor[r.gate] || 'var(--t3)')
    + _kpi('Findings', r.findings || 0, r.findings > 0 ? 'var(--red)' : 'var(--green)')
    + _kpi('Duration', r.dur || '—', 'var(--t2)')
    + '</div>'
    + '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Run ID</div>'
    + '<div style="font-family:var(--font-mono);font-size:11px;color:var(--cyan);background:var(--surface);border-radius:6px;padding:8px 10px;word-break:break-all">' + r.rid + '</div>'
    + '<div style="font-size:10px;color:var(--t3);margin-top:10px">Timestamp: ' + r.ts + (r.mode ? ' · Mode: ' + r.mode : '') + '</div>';
  document.getElementById('run-detail-modal').classList.add('open');
}
function _kpi(lbl, val, color) {
  return '<div style="background:var(--surface);border-radius:7px;padding:9px 11px">'
    + '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">' + lbl + '</div>'
    + '<div style="font-size:16px;font-weight:700;font-family:var(--font-mono);color:' + color + '">' + val + '</div>'
    + '</div>';
}

// ── New / Edit / Save / Delete ─────────────────────────────
function openNewSchedule() {
  _editId = null;
  document.getElementById('smod-title').textContent = 'New schedule';
  document.getElementById('smod-save-btn').textContent = 'Create schedule →';
  document.getElementById('s-name').value = '';
  document.getElementById('s-name').classList.remove('error');
  document.getElementById('s-name-err').style.display = 'none';
  document.getElementById('s-mode').value = 'SAST';
  document.getElementById('s-profile').value = 'EXT';
  document.getElementById('s-cron').value = '0 2 * * *';
  document.getElementById('s-src').value = '';
  document.getElementById('s-tags').value = '';
  document.getElementById('s-enabled').checked = true;
  renderCronPresets();
  selectPreset(1); // "Daily 02:00" is index 1
  document.getElementById('sched-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('s-name').focus(); }, 150);
}

function editSchedule(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  _editId = s.id;
  document.getElementById('smod-title').textContent = 'Edit: ' + s.name;
  document.getElementById('smod-save-btn').textContent = 'Save changes →';
  document.getElementById('s-name').value = s.name;
  document.getElementById('s-name').classList.remove('error');
  document.getElementById('s-name-err').style.display = 'none';
  document.getElementById('s-mode').value = s.mode;
  document.getElementById('s-profile').value = s.profile;
  document.getElementById('s-cron').value = s.cron;
  document.getElementById('s-src').value = s.src;
  document.getElementById('s-tags').value = (s.tags || []).join(', ');
  document.getElementById('s-enabled').checked = s.enabled;
  renderCronPresets();
  selectPresetByCron(s.cron);
  document.getElementById('sched-modal').classList.add('open');
}

function saveSchedule() {
  var name = document.getElementById('s-name').value.trim();
  var nameEl = document.getElementById('s-name');
  var nameErr = document.getElementById('s-name-err');
  if (!name) {
    nameEl.classList.add('error');
    nameErr.style.display = 'block';
    nameEl.focus();
    return;
  }
  nameEl.classList.remove('error');
  nameErr.style.display = 'none';

  var cron = document.getElementById('s-cron').value.trim() || '0 2 * * *';
  // Basic cron validation: must have 5 fields
  var cronParts = cron.split(/\s+/);
  if (cronParts.length !== 5) {
    alert('Invalid cron expression. Must have 5 fields: minute hour day month weekday\nExample: 0 2 * * *');
    return;
  }
  var payload = {
    name: name,
    mode: document.getElementById('s-mode').value,
    profile: document.getElementById('s-profile').value,
    cron: cron,
    src: document.getElementById('s-src').value.trim(),
    tags: document.getElementById('s-tags').value.split(',').map(function(t){ return t.trim(); }).filter(Boolean),
    enabled: document.getElementById('s-enabled').checked};

  if (_editId) {
    var s = SCHEDULES.find(function(x){ return x.id === _editId; });
    if (s) Object.assign(s, payload);
    showToast('Schedule updated', 'success');
    if (TOKEN) fetch(API + '/api/v1/schedules/' + _editId, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(){});
  } else {
    var newS = Object.assign({ id: 'sc' + Date.now(), next_run: '—', last_run: 'never', last_status: '—', last_gate: '—' }, payload);
    SCHEDULES.unshift(newS);
    showToast('Schedule created', 'success');
    if (TOKEN) fetch(API + '/api/v1/schedules', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(){});
  }
  closeModal('sched-modal');
  renderSchedules();
}

function deleteSchedule(idx) {
  var s = SCHEDULES[idx]; // FIX: get id from SCHEDULES[idx], not undeclared var
  if (!s) return;
  if (!confirm('Delete "' + s.name + '"? This cannot be undone.')) return;
  var id = s.id;
  SCHEDULES = SCHEDULES.filter(function(x){ return x.id !== id; });
  renderSchedules();
  showToast('Schedule deleted', 'success');
  if (TOKEN) fetch(API + '/api/v1/schedules/' + id, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + TOKEN }
  }).catch(function(){});
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(function(m){ m.classList.remove('open'); });
  }
});

// ── API loaders ────────────────────────────────────────────
async function loadSchedules() {
  if (!TOKEN) { renderSchedules(); return; }
  try {
    var r = await fetch(API + '/api/v1/schedules', {credentials:'same-origin', headers: { Authorization: 'Bearer ' + TOKEN } });
    if (r.ok) {
      var d = await r.json();
      if (d.schedules && d.schedules.length) {
        SCHEDULES = d.schedules.map(function(s) {
          return {
            id:          s.id,
            name:        s.name,
            mode:        s.mode,
            profile:     s.profile,
            cron:        s.cron,
            src:         s.src || s.url || '—',
            enabled:     s.enabled,
            tags:        s.tags || [],
            next_run:    s.next_run_at ? (function(d){ var n=new Date(d),now=new Date(),tom=new Date(now);tom.setDate(tom.getDate()+1);var hm=n.toTimeString().slice(0,5);return n.toDateString()===now.toDateString()?'today '+hm:n.toDateString()===tom.toDateString()?'tomorrow '+hm:(n.getMonth()+1)+'/'+n.getDate()+' '+hm; })(s.next_run_at) : '—',
            last_run:    s.last_run_at ? (function(d){ var n=new Date(d),now=new Date(),tom=new Date(now);tom.setDate(tom.getDate()+1);var hm=n.toTimeString().slice(0,5);return n.toDateString()===now.toDateString()?'today '+hm:n.toDateString()===tom.toDateString()?'tomorrow '+hm:(n.getMonth()+1)+'/'+n.getDate()+' '+hm; })(s.last_run_at) : '—',
            last_status: '—',
            last_gate:   '—'};
        });
        renderSchedules();
      }
    }
  } catch(e) { renderSchedules(); }
}

async function loadRecentRuns() {
  if (!TOKEN) { renderRecentRuns(); return; }
  try {
    var r = await fetch(API + '/api/v1/vsp/runs?limit=20', {credentials:'same-origin', headers: { Authorization: 'Bearer ' + TOKEN } });
    if (r.ok) {
      var d = await r.json();
      if (d.runs && d.runs.length) {
        RECENT_RUNS = d.runs.map(function(r) {
          return { rid: r.rid||r.id, sched: r.schedule_name||'Manual', status: r.status, gate: r.gate||'—', findings: r.total_findings||0, dur: '—', ts: (r.created_at||'').slice(0,16), mode: r.mode||'' };
        });
        renderRecentRuns();
      }
    }
  } catch(e) { renderRecentRuns(); }
}

// ── Token / theme message bus ──────────────────────────────
function _initWithToken(tk) {
  if (!tk || tk.length < 50 || TOKEN) return;
  TOKEN = tk;
  API = window.location.origin === 'null' ? '' : window.location.origin;
  loadSchedules();
  loadRecentRuns();
}
addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'vsp:token') _initWithToken(e.data.token);
  if (e.data.type === 'vsp:theme') _applyTheme(e.data.theme);
});

if (window.parent !== window) {
  window.parent.postMessage({ type: 'vsp:request_token' }, '*');
  window.parent.postMessage({ type: 'vsp:request_theme' }, '*');
}
(function() {
  var tk = '';
  try { tk = localStorage.getItem('vsp_token') || ''; } catch(ex) {}
  if (tk && tk.length > 50) { setTimeout(function(){ _initWithToken(tk); }, 100); return; }
  var _p = setInterval(function() {
    if (TOKEN) { clearInterval(_p); return; }
    try { tk = localStorage.getItem('vsp_token') || ''; } catch(ex) {}
    if (tk && tk.length > 50) { clearInterval(_p); _initWithToken(tk); }
  }, 300);
  setTimeout(function(){ clearInterval(_p); }, 5000);
})();

function _applyTheme(t) {
  var r = document.documentElement;
  if (t === 'light') {
    r.style.setProperty('--bg', '#f4f5f7');
    r.style.setProperty('--bg2', '#ffffff');
    r.style.setProperty('--surface', '#f0f1f4');
    r.style.setProperty('--border', 'rgba(0,0,0,.08)');
    r.style.setProperty('--t1', '#1a1d24');
    r.style.setProperty('--t2', '#4a5068');
    r.style.setProperty('--t3', '#8a90a8');
    document.body.style.background = '#f4f5f7';
  } else {
    r.style.setProperty('--bg', '#0a0c10');
    r.style.setProperty('--bg2', '#111318');
    r.style.setProperty('--surface', '#1e2128');
    r.style.setProperty('--border', 'rgba(255,255,255,.07)');
    r.style.setProperty('--t1', '#e8eaf0');
    r.style.setProperty('--t2', '#9aa3b8');
    r.style.setProperty('--t3', '#5a6278');
    document.body.style.background = '#0a0c10';
  }
}

// ── Init ───────────────────────────────────────────────────
renderSchedules();
renderRecentRuns();
</script>
