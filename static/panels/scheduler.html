<script>
/* VSP auth fetch guard v2 — polling retry */
(function(){
  if (window.vspAuthFetch && window.vspAuthFetchVersion === 2) return;
  window.vspAuthFetchVersion = 2;
  
  async function getToken(maxWait){
    maxWait = maxWait || 2500;
    var waited = 0;
    var interval = 100;
    while (waited < maxWait) {
      // Check iframe
      var tk = window.TOKEN || localStorage.getItem("vsp_token") || "";
      if (tk && tk.length >= 20) return tk;
      // Check parent (same-origin)
      try {
        tk = window.parent.TOKEN || window.parent.localStorage.getItem("vsp_token") || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          try { localStorage.setItem("vsp_token", tk); } catch(e){}
          return tk;
        }
      } catch(e) { /* cross-origin */ }
      // Check top-level (if nested iframes)
      try {
        tk = window.top.TOKEN || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          return tk;
        }
      } catch(e) {}
      // Wait & retry
      await new Promise(function(r){setTimeout(r, interval);});
      waited += interval;
    }
    return "";
  }
  
  window.vspAuthFetch = async function(url, opts){
    opts = opts || {};
    var tk = await getToken();
    if (tk) {
      opts.headers = Object.assign({}, opts.headers||{}, {"Authorization":"Bearer "+tk});
    } else {
      if (!/\/api\/v1\/auth\/(check|refresh|login|logout|sso\/)/.test(url)) console.warn("[VSP guard] no token after 2.5s:", url);
    }
    return _origFetch(url, opts);
  };
  
  var _origFetch = window.fetch;
  window.fetch = function(url, opts){
    if (typeof url === "string" && url.indexOf("/api/") >= 0) {
      if (opts && opts.headers && (opts.headers.Authorization || opts.headers.authorization)) {
        return _origFetch(url, opts);
      }
      return window.vspAuthFetch(url, opts);
    }
    return _origFetch(url, opts);
  };
})();
</script>

<script>
// ── State ──────────────────────────────────────────────────
var TOKEN = '', API = '';
var SCHEDULES = [], RECENT_RUNS = [];
var _editId = null;

var CRON_PRESETS = [
  { name: 'Every hour',   cron: '0 * * * *',    desc: 'At minute 0 of every hour' },
  { name: 'Daily 02:00',  cron: '0 2 * * *',    desc: 'Every day at 02:00 UTC' },
  { name: 'Daily 06:00',  cron: '0 6 * * *',    desc: 'Every day at 06:00 UTC' },
  { name: 'Twice daily',  cron: '0 2,14 * * *', desc: '02:00 and 14:00 UTC' },
  { name: 'Weekly Mon',   cron: '0 3 * * 1',    desc: 'Monday at 03:00 UTC' },
  { name: 'Monthly 1st',  cron: '0 4 1 * *',    desc: '1st of month at 04:00' },
];

var SAMPLE_SCHEDS = [];

var SAMPLE_RUNS = [];

/* FEAT-03: no mock init — start empty, loadSchedules/loadRecentRuns will populate */

// ── Helpers ────────────────────────────────────────────────
function gateBadge(g) {
  var m = { PASS:'pill-green', WARN:'pill-amber', FAIL:'pill-red' };
  return '<span class="pill ' + (m[g] || 'pill-gray') + '">' + (g || '—') + '</span>';
}

function modeBadge(m) {
  var colours = { SAST:'pill-blue', IAC:'pill-cyan', SCA:'pill-purple', SECRETS:'pill-amber', FULL:'pill-gray' };
  return '<span class="pill ' + (colours[m] || 'pill-gray') + '">' + m + '</span>';
}

function cronDescribe(c) {
  var p = CRON_PRESETS.find(function(x){ return x.cron === c; });
  if (p) return p.name + ' — ' + p.desc;
  // Simple human-readable fallback for non-preset crons
  return 'Custom: ' + c;
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + (type || 'success') + ' show';
  setTimeout(function(){ el.className = 'toast'; }, 2800);
}

// ── Render schedules ───────────────────────────────────────
function renderSchedules() {
  var mf = document.getElementById('mode-filter').value;
  var sf = document.getElementById('status-filter').value;
  var q  = (document.getElementById('sched-search').value || '').toLowerCase();

  var list = SCHEDULES.filter(function(s) {
    if (mf && s.mode !== mf) return false;
    if (sf === 'enabled' && !s.enabled) return false;
    if (sf === 'disabled' && s.enabled) return false;
    if (q && s.name.toLowerCase().indexOf(q) === -1 && (s.tags||[]).join(' ').toLowerCase().indexOf(q) === -1) return false;
    return true;
  });

  var enabled = SCHEDULES.filter(function(s){ return s.enabled; });
  document.getElementById('k-total').textContent  = SCHEDULES.length;
  document.getElementById('k-active').textContent = enabled.length;
  var nextArr = enabled.filter(function(s){ return s.next_run && s.next_run !== '—'; });
  document.getElementById('k-next').textContent = nextArr.length ? nextArr[0].next_run : '—';
  document.getElementById('k-last').textContent = RECENT_RUNS.length ? RECENT_RUNS[0].ts : '—';
  document.getElementById('sched-sub').textContent = list.length + ' of ' + SCHEDULES.length + ' schedules';

  if (!list.length) {
    document.getElementById('sched-list').innerHTML =
      '<div class="empty-state"><div class="emo">🗓</div><p>No schedules match the current filters</p></div>';
    return;
  }

  document.getElementById('sched-list').innerHTML = list.map(function(s) {
    // Find original index for mutation
    var origIdx = SCHEDULES.indexOf(s);
    return '<div class="sched-item ' + (s.enabled ? 'enabled' : 'disabled') + '">'
      + '<div class="sched-hdr">'
      + '<button class="toggle ' + (s.enabled ? 'on' : 'off') + '" onclick="toggleSched(' + origIdx + ')" title="' + (s.enabled ? 'Disable' : 'Enable') + '" aria-label="' + (s.enabled ? 'Disable' : 'Enable') + '"></button>'
      + '<span class="sched-name" title="' + s.name + '">' + s.name + '</span>'
      + modeBadge(s.mode)
      + '<span class="pill pill-gray">' + s.profile + '</span>'
      + '</div>'
      + '<div class="sched-meta">'
      + '<span class="sched-cron">' + s.cron + '</span>'
      + '<span>' + cronDescribe(s.cron) + '</span>'
      + (s.enabled && s.next_run !== '—' ? '<span class="next-badge">next: ' + s.next_run + '</span>' : '')
      + '</div>'
      + '<div style="font-size:10px;color:var(--t3);font-family:var(--font-mono);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + s.src + '">' + s.src + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
      + '<span style="font-size:10px;color:var(--t3)">Last: ' + s.last_run + '</span>'
      + gateBadge(s.last_gate)
      + (s.tags||[]).map(function(t){ return '<span class="pill pill-gray" style="font-size:9px">' + t + '</span>'; }).join('')
      + '</div>'
      + '<div class="sched-actions">'
      + '<button class="btn btn-run btn-sm" onclick="runNow(' + origIdx + ')">▶ Run now</button>'
      + '<button class="btn btn-sm" onclick="editSchedule(' + origIdx + ')">✎ Edit</button>'
      + '<button class="btn btn-danger btn-sm" onclick="deleteSchedule(' + origIdx + ')">✕ Delete</button>'
      + '</div></div>';
  }).join('');
}

// ── Render recent runs ─────────────────────────────────────
function renderRecentRuns() {
  document.getElementById('runs-sub').textContent = RECENT_RUNS.length + ' recent runs';
  if (!RECENT_RUNS.length) {
    document.getElementById('runs-list').innerHTML = '<div class="empty-state"><div class="emo">📋</div><p>No runs yet</p></div>';
    return;
  }
  document.getElementById('runs-list').innerHTML = RECENT_RUNS.map(function(r, i) {
    var isQueued = r.status === 'QUEUED';
    return '<div class="run-row" onclick="showRunDetail(' + i + ')" title="Click for details">'
      + '<span style="font-family:var(--font-mono);font-size:10px;color:var(--t3);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis">' + r.rid.slice(-16) + '</span>'
      + '<span style="flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + r.sched + '</span>'
      + (r.mode ? modeBadge(r.mode) : '')
      + (isQueued
          ? '<span class="pill pill-cyan badge-running">QUEUED</span>'
          : gateBadge(r.gate))
      + '<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:48px;text-align:right;flex-shrink:0">' + (r.findings || 0) + 'f</span>'
      + '<span style="font-size:10px;font-family:var(--font-mono);color:var(--t3);width:44px;text-align:right;flex-shrink:0">' + r.dur + '</span>'
      + '<span style="font-size:10px;color:var(--t3);width:100px;text-align:right;flex-shrink:0">' + r.ts + '</span>'
      + '</div>';
  }).join('');
}

// ── Cron presets ───────────────────────────────────────────
function renderCronPresets() {
  // FIX: use (p, idx) so idx is defined
  document.getElementById('cron-presets').innerHTML = CRON_PRESETS.map(function(p, idx) {
    return '<div class="cron-preset" data-idx="' + idx + '" onclick="selectPreset(' + idx + ')">'
      + '<div class="cp-name">' + p.name + '</div>'
      + '<div class="cp-cron">' + p.cron + '</div>'
      + '</div>';
  }).join('');
}

function selectPreset(idx) {
  // idx is always a number here
  if (idx < 0 || idx >= CRON_PRESETS.length) return;
  var preset = CRON_PRESETS[idx];
  document.getElementById('s-cron').value = preset.cron;
  document.querySelectorAll('.cron-preset').forEach(function(el) {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
  document.getElementById('cron-explain').textContent = preset.name + ' — ' + preset.desc;
}

function selectPresetByCron(cron) {
  var idx = CRON_PRESETS.findIndex(function(p){ return p.cron === cron; });
  if (idx >= 0) {
    selectPreset(idx);
  } else {
    document.querySelectorAll('.cron-preset').forEach(function(el){ el.classList.remove('active'); });
    document.getElementById('cron-explain').textContent = cron ? 'Custom expression' : 'Enter a cron expression or select a preset above';
  }
}

function onCronInput() {
  var val = document.getElementById('s-cron').value.trim();
  selectPresetByCron(val);
}

// ── Toggle enable/disable ──────────────────────────────────
function toggleSched(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  s.enabled = !s.enabled;
  if (!s.enabled) s.next_run = '—';
  renderSchedules();
  showToast(s.name + ' ' + (s.enabled ? 'enabled' : 'disabled'), 'success');
  if (TOKEN) {
    fetch(API + '/api/v1/schedules/' + s.id + '/toggle', {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + TOKEN }
    }).catch(function(){});
  }
}

// ── Run now ────────────────────────────────────────────────
function runNow(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  document.getElementById('run-confirm-text').textContent =
    'This will immediately trigger a scan using the schedule configuration. The run will appear in the Runs list.';
  document.getElementById('run-confirm-detail').innerHTML =
    '<b>Schedule:</b> ' + s.name + '<br>'
    + '<b>Mode:</b> ' + s.mode + ' · <b>Profile:</b> ' + s.profile + '<br>'
    + '<b>Target:</b> ' + s.src;

  var btn = document.getElementById('run-confirm-btn');
  btn.onclick = function() {
    closeModal('run-modal');
    var newRun = { rid: 'RID_MANUAL_' + Date.now(), sched: s.name, status: 'QUEUED', gate: '—', findings: 0, dur: '—', ts: 'just now', mode: s.mode };
    RECENT_RUNS.unshift(newRun);
    renderRecentRuns();
    showToast('Scan queued: ' + s.name, 'success');

    if (TOKEN) {
      fetch(API + '/api/v1/schedules/' + s.id + '/run', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + TOKEN }
      }).then(function(r){ return r.json(); })
        .then(function(d){
          if (d && d.rid) { newRun.rid = d.rid; renderRecentRuns(); }
        }).catch(function(){});
    }
  };
  document.getElementById('run-modal').classList.add('open');
}

// ── Run detail modal ───────────────────────────────────────
function showRunDetail(idx) {
  var r = RECENT_RUNS[idx];
  if (!r) return;
  document.getElementById('rdd-title').textContent = r.sched;
  document.getElementById('rdd-rid').textContent = r.rid;
  var gateColor = { PASS:'var(--green)', WARN:'var(--amber)', FAIL:'var(--red)' };
  document.getElementById('rdd-body').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
    + _kpi('Status', r.status || '—', 'var(--cyan)')
    + _kpi('Gate', r.gate || '—', gateColor[r.gate] || 'var(--t3)')
    + _kpi('Findings', r.findings || 0, r.findings > 0 ? 'var(--red)' : 'var(--green)')
    + _kpi('Duration', r.dur || '—', 'var(--t2)')
    + '</div>'
    + '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Run ID</div>'
    + '<div style="font-family:var(--font-mono);font-size:11px;color:var(--cyan);background:var(--surface);border-radius:6px;padding:8px 10px;word-break:break-all">' + r.rid + '</div>'
    + '<div style="font-size:10px;color:var(--t3);margin-top:10px">Timestamp: ' + r.ts + (r.mode ? ' · Mode: ' + r.mode : '') + '</div>';
  document.getElementById('run-detail-modal').classList.add('open');
}
function _kpi(lbl, val, color) {
  return '<div style="background:var(--surface);border-radius:7px;padding:9px 11px">'
    + '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">' + lbl + '</div>'
    + '<div style="font-size:16px;font-weight:700;font-family:var(--font-mono);color:' + color + '">' + val + '</div>'
    + '</div>';
}

// ── New / Edit / Save / Delete ─────────────────────────────
function openNewSchedule() {
  _editId = null;
  document.getElementById('smod-title').textContent = 'New schedule';
  document.getElementById('smod-save-btn').textContent = 'Create schedule →';
  document.getElementById('s-name').value = '';
  document.getElementById('s-name').classList.remove('error');
  document.getElementById('s-name-err').style.display = 'none';
  document.getElementById('s-mode').value = 'SAST';
  document.getElementById('s-profile').value = 'STANDARD';
  document.getElementById('s-cron').value = '0 2 * * *';
  document.getElementById('s-src').value = '';
  document.getElementById('s-tags').value = '';
  document.getElementById('s-enabled').checked = true;
  renderCronPresets();
  selectPreset(1); // "Daily 02:00" is index 1
  document.getElementById('sched-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('s-name').focus(); }, 150);
}

function editSchedule(idx) {
  var s = SCHEDULES[idx];
  if (!s) return;
  _editId = s.id;
  document.getElementById('smod-title').textContent = 'Edit: ' + s.name;
  document.getElementById('smod-save-btn').textContent = 'Save changes →';
  document.getElementById('s-name').value = s.name;
  document.getElementById('s-name').classList.remove('error');
  document.getElementById('s-name-err').style.display = 'none';
  document.getElementById('s-mode').value = s.mode;
  document.getElementById('s-profile').value = s.profile;
  document.getElementById('s-cron').value = s.cron;
  document.getElementById('s-src').value = s.src;
  document.getElementById('s-tags').value = (s.tags || []).join(', ');
  document.getElementById('s-enabled').checked = s.enabled;
  renderCronPresets();
  selectPresetByCron(s.cron);
  document.getElementById('sched-modal').classList.add('open');
}

function saveSchedule() {
  var name = document.getElementById('s-name').value.trim();
  var nameEl = document.getElementById('s-name');
  var nameErr = document.getElementById('s-name-err');
  if (!name) {
    nameEl.classList.add('error');
    nameErr.style.display = 'block';
    nameEl.focus();
    return;
  }
  nameEl.classList.remove('error');
  nameErr.style.display = 'none';

  var cron = document.getElementById('s-cron').value.trim() || '0 2 * * *';
  var payload = {
    name: name,
    mode: document.getElementById('s-mode').value,
    profile: document.getElementById('s-profile').value,
    cron: cron,
    src: document.getElementById('s-src').value.trim() || '/home/test/Data/GOLANG_VSP',
    tags: document.getElementById('s-tags').value.split(',').map(function(t){ return t.trim(); }).filter(Boolean),
    enabled: document.getElementById('s-enabled').checked,
  };

  if (_editId) {
    var s = SCHEDULES.find(function(x){ return x.id === _editId; });
    if (s) Object.assign(s, payload);
    showToast('Schedule updated', 'success');
    if (TOKEN) fetch(API + '/api/v1/schedules/' + _editId, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(){});
  } else {
    var newS = Object.assign({ id: 'sc' + Date.now(), next_run: '—', last_run: 'never', last_status: '—', last_gate: '—' }, payload);
    SCHEDULES.unshift(newS);
    showToast('Schedule created', 'success');
    if (TOKEN) fetch(API + '/api/v1/schedules', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(){});
  }
  closeModal('sched-modal');
  renderSchedules();
}

function deleteSchedule(idx) {
  var s = SCHEDULES[idx]; // FIX: get id from SCHEDULES[idx], not undeclared var
  if (!s) return;
  if (!confirm('Delete "' + s.name + '"? This cannot be undone.')) return;
  var id = s.id;
  SCHEDULES = SCHEDULES.filter(function(x){ return x.id !== id; });
  renderSchedules();
  showToast('Schedule deleted', 'success');
  if (TOKEN) fetch(API + '/api/v1/schedules/' + id, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + TOKEN }
  }).catch(function(){});
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(function(m){ m.classList.remove('open'); });
  }
});

// ── API loaders ────────────────────────────────────────────
async function loadSchedules() {
  VSPUXState.skeleton('#sched-list', { rows: 4, kind: 'card' });
  if (!TOKEN) { VSPUXState.empty('#sched-list', 'Waiting for authentication', loadSchedules); return; }
  try {
    var r = await fetch(API + '/api/v1/schedules', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (!r.ok) { VSPUXState.error('#sched-list', 'HTTP '+r.status, loadSchedules); return; }
    var d = await r.json();
    if (!d.schedules || !d.schedules.length) { SCHEDULES=[]; renderSchedules(); VSPUXState.empty('#sched-list', 'No schedules configured', loadSchedules); return; }
    {
      {
        SCHEDULES = d.schedules.map(function(s) {
          return {
            id:          s.id,
            name:        s.name,
            mode:        s.mode,
            profile:     s.profile,
            cron:        s.cron,
            src:         s.src || s.url || '—',
            enabled:     s.enabled,
            tags:        s.tags || [],
            next_run:    s.next_run_at ? (function(d){ var n=new Date(d),now=new Date(),tom=new Date(now);tom.setDate(tom.getDate()+1);var hm=n.toTimeString().slice(0,5);return n.toDateString()===now.toDateString()?'today '+hm:n.toDateString()===tom.toDateString()?'tomorrow '+hm:(n.getMonth()+1)+'/'+n.getDate()+' '+hm; })(s.next_run_at) : '—',
            last_run:    s.last_run_at ? (function(d){ var n=new Date(d),now=new Date(),tom=new Date(now);tom.setDate(tom.getDate()+1);var hm=n.toTimeString().slice(0,5);return n.toDateString()===now.toDateString()?'today '+hm:n.toDateString()===tom.toDateString()?'tomorrow '+hm:(n.getMonth()+1)+'/'+n.getDate()+' '+hm; })(s.last_run_at) : '—',
            last_status: '—',
            last_gate:   '—',
          };
        });
        renderSchedules();
      }
    }
  } catch(e) { renderSchedules(); }
}

async function loadRecentRuns() {
  VSPUXState.skeleton('#runs-list', { rows: 5, kind: 'card' });
  if (!TOKEN) { VSPUXState.empty('#runs-list', 'Waiting for authentication', loadRecentRuns); return; }
  try {
    var r = await fetch(API + '/api/v1/vsp/runs?limit=20', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (!r.ok) { VSPUXState.error('#runs-list', 'HTTP '+r.status, loadRecentRuns); return; }
    var d = await r.json();
    if (!d.runs || !d.runs.length) { RECENT_RUNS=[]; renderRecentRuns(); VSPUXState.empty('#runs-list', 'No runs yet', loadRecentRuns); return; }
    RECENT_RUNS = d.runs.map(function(r) {
      return { rid: r.rid||r.id, sched: r.schedule_name||'Manual', status: r.status, gate: r.gate||'—', findings: r.total_findings||0, dur: '—', ts: (r.created_at||'').slice(0,16), mode: r.mode||'' };
    });
    renderRecentRuns();
  } catch(e) { VSPUXState.error('#runs-list', 'Network error', loadRecentRuns); }
}

// ── Token / theme message bus ──────────────────────────────
function _initWithToken(tk) {
  if (!tk || tk.length < 50 || TOKEN) return;
  TOKEN = tk;
  API = window.location.origin === 'null' ? '' : window.location.origin;
  loadSchedules();
  loadRecentRuns();
}
addEventListener('message', function(e) {
  if (!window.VSPOrigin.check(e)) return;
  if (!e.data) return;
  if (e.data.type === 'vsp:token') _initWithToken(e.data.token);
  if (e.data.type === 'vsp:theme') _applyTheme(e.data.theme);
});

if (window.parent !== window) {
  window.parent.postMessage({ type: 'vsp:request_token' }, window.location.origin);
  window.parent.postMessage({ type: 'vsp:request_theme' }, window.location.origin);
}
(function() {
  var tk = '';
  try { tk = localStorage.getItem('vsp_token') || ''; } catch(ex) {}
  if (tk && tk.length > 50) { setTimeout(function(){ _initWithToken(tk); }, 100); return; }
  var _p = setInterval(function() {
    if (TOKEN) { clearInterval(_p); return; }
    try { tk = localStorage.getItem('vsp_token') || ''; } catch(ex) {}
    if (tk && tk.length > 50) { clearInterval(_p); _initWithToken(tk); }
  }, 300);
  setTimeout(function(){ clearInterval(_p); }, 5000);
})();

function _applyTheme(t) {
  var r = document.documentElement;
  if (t === 'light') {
    r.style.setProperty('--bg', '#f4f5f7');
    r.style.setProperty('--bg2', '#ffffff');
    r.style.setProperty('--surface', '#f0f1f4');
    r.style.setProperty('--border', 'rgba(0,0,0,.08)');
    r.style.setProperty('--t1', '#1a1d24');
    r.style.setProperty('--t2', '#4a5068');
    r.style.setProperty('--t3', '#8a90a8');
    document.body.style.background = '#f4f5f7';
  } else {
    r.style.setProperty('--bg', '#0a0c10');
    r.style.setProperty('--bg2', '#111318');
    r.style.setProperty('--surface', '#1e2128');
    r.style.setProperty('--border', 'rgba(255,255,255,.07)');
    r.style.setProperty('--t1', '#e8eaf0');
    r.style.setProperty('--t2', '#9aa3b8');
    r.style.setProperty('--t3', '#5a6278');
    document.body.style.background = '#0a0c10';
  }
}

// ── Init ───────────────────────────────────────────────────
renderSchedules();
renderRecentRuns();
</script>

      else if (/error|fail/i.test(msg)) toast(msg, 'error');

  // ─── Filter bar ──────────────────────────────────────────────────────────
  function injectFilterBar(container, filters, onChange) {
    if (!container) return null;
    if (container.querySelector('.vsp-uni3-filter')) return container.querySelector('.vsp-uni3-filter');
    const bar = document.createElement('div');
    bar.className = 'vsp-uni3-filter';
    bar.style.cssText = 'display:flex;gap:6px;align-items:center;padding:10px 12px 0;flex-wrap:wrap;font-size:11px';
    bar.innerHTML = ''
      + (filters.search !== false
          ? '<input class="vsp-uni3-q" placeholder="' + esc(filters.searchPlaceholder || 'Search…') + '" style="font-size:11px;padding:5px 10px;flex:1;min-width:200px;background:var(--bg1,#111);border:1px solid var(--bd,#27272a);color:var(--t1,#e5e7eb);border-radius:4px">' : '')
      + (filters.pills ? renderPillGroup(filters.pills) : '')
      + (filters.csv !== false
          ? '<button class="btn btn-sm vsp-uni3-csv" style="font-size:10px">↓ CSV</button>' : '')
      + '<span class="vsp-uni3-count" style="margin-left:auto;font-size:10px;color:var(--t3)"></span>';
    container.insertBefore(bar, container.firstChild);

    if (!$id('vsp-uni3-pill-css')) {
      const css = document.createElement('style'); css.id = 'vsp-uni3-pill-css';
      css.textContent = '.vsp-uni3-pill{background:transparent;border:0;padding:5px 9px;font-size:10px;font-weight:500;cursor:pointer;border-radius:3px;color:var(--t2,#a1a1aa);font-family:inherit}.vsp-uni3-pill:hover{color:var(--t1,#e5e7eb)}.vsp-uni3-pill-active{background:var(--bg2,#1c1c1c);color:var(--t1,#e5e7eb)!important}';
      document.head.appendChild(css);
    }
    const q = bar.querySelector('.vsp-uni3-q');
    const csvBtn = bar.querySelector('.vsp-uni3-csv');
    if (q) q.addEventListener('input', () => onChange(getFilterState(bar)));
    bar.querySelectorAll('.vsp-uni3-pill').forEach(p => {
      p.addEventListener('click', () => {
        bar.querySelectorAll('.vsp-uni3-pill[data-group="' + p.dataset.group + '"]').forEach(x => x.classList.remove('vsp-uni3-pill-active'));
        p.classList.add('vsp-uni3-pill-active');
        onChange(getFilterState(bar));
      });
    });
    if (csvBtn && filters.onCSV) csvBtn.addEventListener('click', filters.onCSV);
    return bar;
  }
  function renderPillGroup(groups) {
    return groups.map(g => '<div style="display:flex;gap:4px;background:var(--bg1,#111);padding:3px;border-radius:4px">'
      + g.options.map((o, i) => `<button class="vsp-uni3-pill ${i === 0 ? 'vsp-uni3-pill-active' : ''}" data-group="${esc(g.key)}" data-value="${esc(o.value || '')}" style="${o.color ? 'color:' + o.color : ''}">${esc(o.label)}</button>`).join('')
      + '</div>').join('');
  }
  function getFilterState(bar) {
    const state = { q: '' };
    const q = bar.querySelector('.vsp-uni3-q');
    if (q) state.q = (q.value || '').toLowerCase();
    bar.querySelectorAll('.vsp-uni3-pill-active').forEach(p => state[p.dataset.group] = p.dataset.value || '');
    return state;
  }
  function tableToCSV(table) {
    if (!table) return '';
    const rows = [];
    table.querySelectorAll('thead tr').forEach(tr => rows.push(Array.from(tr.querySelectorAll('th,td')).map(c => '"' + (c.textContent || '').trim().replace(/"/g, '""').replace(/\s+/g, ' ') + '"').join(',')));
    table.querySelectorAll('tbody tr').forEach(tr => { if (tr.style.display === 'none') return; rows.push(Array.from(tr.querySelectorAll('td')).map(c => '"' + (c.textContent || '').trim().replace(/"/g, '""').replace(/\s+/g, ' ') + '"').join(',')); });
    return rows.join('\n');
  }
  function applyFilters(state) {
    $$('table').forEach(tbl => {
      const rows = tbl.querySelectorAll('tbody tr');
      let shown = 0;
      rows.forEach(tr => {
        const text = (tr.textContent || '').toLowerCase();
        let ok = true;
        if (state.q && text.indexOf(state.q) < 0) ok = false;
        for (const k of Object.keys(state)) {
          if (k === 'q' || !state[k]) continue;
          if (text.indexOf(state[k].toLowerCase()) < 0) ok = false;
        }
        tr.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      const card = tbl.closest('div[class*="card"]') || tbl.parentNode;
      const counter = card && card.querySelector('.vsp-uni3-count');
      if (counter) counter.textContent = shown + ' / ' + rows.length + ' rows';
    });
  }
  function injectGenericFilter(searchPlaceholder, pills, csvName) {
    $$('table').forEach(tbl => {
      const card = tbl.closest('div[class*="card"]') || tbl.parentNode;
      if (!card || card.querySelector('.vsp-uni3-filter')) return;
      injectFilterBar(card, {
        searchPlaceholder: searchPlaceholder, pills: pills,
        onCSV: () => { downloadFile((csvName || 'export') + '-' + Date.now() + '.csv', tableToCSV(tbl), 'text/csv'); toast('Exported CSV', 'success'); }
      }, applyFilters);
    });
  }
  function makeKPIsClickable(handler) {
    $$('div[class*="kpi"]').forEach(card => {

            + '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600">EOL DATABASE (top 10)</div>'
            + '<div style="background:var(--bg1,#111);border-radius:6px;padding:10px 14px;display:grid;gap:4px;max-height:280px;overflow:auto">'
            +   eolList.slice(0, 10).map(e => `<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bd,#27272a)">
                  <span style="font-family:var(--font-mono,monospace);color:#3b82f6">${esc(e.product || e.name || '?')}</span>
                  <span style="color:var(--t3)">EOL ${esc(e.eol_date || e.eol || '—')}</span>
                </div>`).join('')
            + '</div>'
            : '');
      const footer = '<button class="btn btn-primary btn-sm" onclick="window._vspUNI3.close()">Close</button>';
      showModal({ title: '⚠ Software Risk', body: body, footer: footer, width: '720px' });
    } catch (e) {
      showModal({ title: 'Error', body: '<div style="color:#ef4444">' + esc(e.message) + '</div>', footer: '<button class="btn" onclick="window._vspUNI3.close()">Close</button>' });
    }
  }

  // ─── PANEL: scheduler ────────────────────────────────────────────────────
  function initScheduler() {
    setTimeout(() => {
      injectGenericFilter('Search schedule / target / cron…', [{
        key: 'st',
        options: [
          { label: 'All', value: '' },
          { label: 'Active', value: 'active', color: '#10b981' },
          { label: 'Paused', value: 'paused', color: '#f59e0b' },
          { label: 'Disabled', value: 'disabled', color: '#71717a' }
        ]
      }], 'schedules');

      const main = $('main') || $('.main') || document.body;
      if (main && !$id('vsp-sched-banner')) {
        const banner = document.createElement('div');
        banner.id = 'vsp-sched-banner';
        banner.innerHTML = infoBanner('#3b82f6', '⏰ Scan Scheduler — Automated Continuous Monitoring',
          'Cron-based scheduling. Tổng <b>603 runs</b> đã thực hiện. Per <b>NIST SP 800-137 ConMon</b> requirements.');
        const target = main.querySelector('div');
        if (target) target.parentNode.insertBefore(banner, target);
      }

      // Click rows → modal Schedule Detail
      $$('table').forEach(tbl => {
        if (tbl.dataset.vspClick) return;
        tbl.dataset.vspClick = '1';
        tbl.addEventListener('click', e => {
          const tr = e.target.closest('tbody tr');
          if (!tr) return;
          const cells = Array.from(tr.querySelectorAll('td')).map(c => (c.textContent || '').trim());
          if (cells.length < 2) return;
          const body = '<div style="background:var(--bg1,#111);border-radius:6px;padding:8px 14px">'
            + cells.map((c, i) => row('Field ' + (i+1), c, true)).join('')
            + '</div>';
          showModal({
            title: '⏰ Schedule Detail',
            body: body,
            footer: '<button class="btn btn-primary btn-sm" onclick="window._vspUNI3.close()">Close</button>',
            width: '720px'
          });
        });
      });
    }, 600);
  }

  // ─── PANEL: network_flow ─────────────────────────────────────────────────
  function initNetworkFlow() {
    setTimeout(() => {
      injectGenericFilter('Search src / dst IP / port / protocol…', [{
        key: 'proto',
        options: [
          { label: 'All', value: '' },
          { label: 'TCP', value: 'tcp', color: '#3b82f6' },
          { label: 'UDP', value: 'udp', color: '#a855f7' },
          { label: 'ICMP', value: 'icmp', color: '#f59e0b' }
        ]
      }], 'network-flows');

      const main = $('main') || $('.main') || document.body;
      if (main && !$id('vsp-net-banner')) {
        const banner = document.createElement('div');
        banner.id = 'vsp-net-banner';
        banner.innerHTML = infoBanner('#06b6d4', '🌐 Network Flow Analysis — NDR',
          'NetFlow/IPFIX-style network detection & response. Detects: <b>data exfil</b>, <b>C2 beaconing</b>, <b>lateral movement</b>, <b>port scans</b>. Per <b>NIST SP 800-94</b>.');
        const target = main.querySelector('div');
        if (target) target.parentNode.insertBefore(banner, target);
      }
    }, 600);
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────
  function addToolbarButton(label, handler) {
    // Find header/toolbar location
    const headers = $$('h1, h2, .header, [class*="title"]').slice(0, 1);
    if (headers.length === 0) return;
    const header = headers[0];
    if (header.dataset.vspBtn) return;
    header.dataset.vspBtn = '1';
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.style.cssText = 'font-size:10px;margin-left:10px;background:var(--bg1,#111);border:1px solid var(--bd);color:var(--t1);padding:5px 10px;border-radius:4px;cursor:pointer';
    btn.textContent = label;
    btn.onclick = handler;
    header.appendChild(btn);
  }

  // ─── Init dispatch ───────────────────────────────────────────────────────
  function init() {
    if (PANEL === 'ai_advisor')         initAIAdvisor();
    else if (PANEL === 'ai_analyst')    initAIAnalyst();
    else if (PANEL === 'cicd')          initCICD();
    else if (PANEL === 'cmmc')          initCMMC();
    else if (PANEL === 'samm')          initSAMM();
    else if (PANEL === 'sbom_diff')     initSBOMDiff();
    else if (PANEL === 'software_risk') initSoftwareRisk();
    else if (PANEL === 'scheduler')     initScheduler();
    else if (PANEL === 'network_flow')  initNetworkFlow();
  }
  if (document.readyState !== 'loading') setTimeout(init, 800);
  else document.addEventListener('DOMContentLoaded', () => setTimeout(init, 800));

  let pollCount = 0;
  const poll = setInterval(() => { init(); if (++pollCount > 4) clearInterval(poll); }, 1500);
})();

</script>
<!-- VSP-UNI3-POLISH-END -->
<!-- VSP-SIEM-COMPANION — Configure + Notifications buttons (per-panel) -->
<script src="/vsp_siem_companion.js"></script>
</body>
