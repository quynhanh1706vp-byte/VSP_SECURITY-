<script>
/* VSP iframe token bootstrap v1 — synchronous, runs before async guards */
(function(){
  var tok = "";
  try {
    var params = new URLSearchParams(window.location.search);
    tok = params.get("token") || "";
  } catch(e) {}
  if (!tok) tok = localStorage.getItem("vsp_token") || "";
  if (!tok) { try { tok = window.parent.TOKEN || window.parent.localStorage.getItem("vsp_token") || ""; } catch(e) {} }
  if (!tok) { try { tok = window.top.TOKEN || window.top.localStorage.getItem("vsp_token") || ""; } catch(e) {} }
  if (tok && tok.length >= 20) {
    window.TOKEN = tok;
    try { localStorage.setItem("vsp_token", tok); } catch(e) {}
    console.log("[VSP iframe] token bootstrapped, length:", tok.length);
  } else {
    console.warn("[VSP iframe] no token available at bootstrap");
  }
})();
</script>

let state = {};
try{ state=JSON.parse(localStorage.getItem('vsp_cmmc')||'{}'); }catch(e){}
let activeDomain='AC', filterStatus='all';

function saveState(){ try{localStorage.setItem('vsp_cmmc',JSON.stringify(state));}catch(e){} }

function getStatus(id){ return state[id]||'open'; }
function setStatus(id, s){ state[id]=s; saveState(); render(); }

function cycleStatus(id){
  const order=['open','pass','fail','na'];
  const cur=getStatus(id);
  const next=order[(order.indexOf(cur)+1)%order.length];
  setStatus(id,next);
}

function calcStats(){
  let pass=0,fail=0,open=0,na=0;
  Object.values(CONTROLS).flat().forEach(c=>{
    const s=getStatus(c.id);
    if(s==='pass') pass++;
    else if(s==='fail') fail++;
    else if(s==='na') na++;
    else open++;
  });
  const total=pass+fail+open;
  return {pass,fail,open,na,score:total>0?Math.round(pass/total*100):0};
}

function calcDomainStats(domId){
  const ctrls=CONTROLS[domId]||[];
  let pass=0,fail=0,open=0;
  ctrls.forEach(c=>{ const s=getStatus(c.id); if(s==='pass')pass++; else if(s==='fail')fail++; else if(s!=='na')open++; });
  const total=pass+fail+open;
  return {pass,fail,open,score:total>0?Math.round(pass/total*100):0,total:ctrls.length};
}

      <span style="display:flex;flex-direction:column;gap:2px">
        <span style="font-weight:500;color:${activeDomain===d.id?'#60a5fa':'#cbd5e1'}">${d.id} — ${d.name}</span>
        <span style="font-size:9px;color:${color}">${st.pass}/${st.total} pass · ${st.score}%</span>
      </span>
      <span class="domain-badge">${d.practices}</span>
    </button>`;
  }).join('');
}

function renderMain(){
  const dom=DOMAINS.find(d=>d.id===activeDomain);
  const ctrls=(CONTROLS[activeDomain]||[]).filter(c=>{
    if(filterStatus==='all') return true;
    return getStatus(c.id)===filterStatus;
  });
  const st=calcDomainStats(activeDomain);
  const pct=st.score;
  const color=pct>=80?'#10b981':pct>=50?'#f59e0b':'#ef4444';

  const main=document.getElementById('main');
  main.innerHTML=`
    <div class="domain-title">${dom.id} — ${dom.name}</div>
    <div class="domain-sub">${st.pass} passed · ${st.fail} failed · ${st.open} open · ${st.total} total</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="filter-row">
      ${['all','pass','fail','open','na'].map(f=>`<button class="filter-btn ${filterStatus===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    </div>
    <div class="controls-grid">
      ${ctrls.map(c=>{
        const s=getStatus(c.id);
        const sc=s==='pass'?'s-pass':s==='fail'?'s-fail':s==='na'?'s-na':'s-open';
        const sl=s==='pass'?'status-pass':s==='fail'?'status-fail':s==='na'?'status-na':'';
        return `<div class="ctrl ${sl}" onclick="cycleStatus('${c.id}')">
          <div class="ctrl-head">
            <span class="ctrl-id">${c.id}</span>
            <span class="ctrl-title">${c.title}</span>
            <span class="ctrl-status ${sc}">${s.toUpperCase()}</span>
          </div>
          <div class="ctrl-desc">${c.desc}</div>
          ${c.tools.length?`<div class="ctrl-tools">${c.tools.map(t=>`<span class="tool-tag">${t}</span>`).join('')}</div>`:''}
          ${s==='fail'?`<div class="ctrl-evidence" style="color:#fca5a5">⚠ Remediation required — check VSP findings</div>`:''}
          ${s==='pass'?`<div class="ctrl-evidence">✓ Verified — evidence recorded</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

function render(){
  const st=calcStats();
  document.getElementById('kpi-pass').textContent=st.pass;
  document.getElementById('kpi-fail').textContent=st.fail;
  document.getElementById('kpi-open').textContent=st.open;
  document.getElementById('kpi-score').textContent=st.score+'%';
  renderSidebar();
  renderMain();
}

function setDomain(id){ activeDomain=id; filterStatus='all'; render(); }
function setFilter(f){ filterStatus=f; render(); }

function resetAll(){
  if(!confirm('Reset tất cả đánh giá CMMC?')) return;
  state={}; saveState(); render();
}

function exportCSV(){
  let csv='ID,Domain,Title,Status,Level,Tools\n';
  DOMAINS.forEach(d=>{
    (CONTROLS[d.id]||[]).forEach(c=>{
      csv+=`"${c.id}","${d.name}","${c.title}","${getStatus(c.id)}",${c.level},"${c.tools.join(';')}"\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`cmmc-assessment-${Date.now()}.csv`;
  a.click();
}

render();
</script>
</body>
</html>
