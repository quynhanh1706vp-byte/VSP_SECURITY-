<script>
/* VSP auth fetch guard v2 — polling retry */
(function(){
  if (window.vspAuthFetch && window.vspAuthFetchVersion === 2) return;
  window.vspAuthFetchVersion = 2;
  
  async function getToken(maxWait){
    maxWait = maxWait || 2500;
    var waited = 0;
    var interval = 100;
    while (waited < maxWait) {
      // Check iframe
      var tk = window.TOKEN || localStorage.getItem("vsp_token") || "";
      if (tk && tk.length >= 20) return tk;
      // Check parent (same-origin)
      try {
        tk = window.parent.TOKEN || window.parent.localStorage.getItem("vsp_token") || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          try { localStorage.setItem("vsp_token", tk); } catch(e){}
          return tk;
        }
      } catch(e) { /* cross-origin */ }
      // Check top-level (if nested iframes)
      try {
        tk = window.top.TOKEN || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          return tk;
        }
      } catch(e) {}
      // Wait & retry
      await new Promise(function(r){setTimeout(r, interval);});
      waited += interval;
    }
    return "";
  }
  
  window.vspAuthFetch = async function(url, opts){
    opts = opts || {};
    var tk = await getToken();
    if (tk) {
      opts.headers = Object.assign({}, opts.headers||{}, {"Authorization":"Bearer "+tk});
    } else {
      if (!/\/api\/v1\/auth\/(check|refresh|login|logout|sso\/)/.test(url)) console.warn("[VSP guard] no token after 2.5s:", url);
    }
    return _origFetch(url, opts);
  };
  
  var _origFetch = window.fetch;
  window.fetch = function(url, opts){
    if (typeof url === "string" && url.indexOf("/api/") >= 0) {
      if (opts && opts.headers && (opts.headers.Authorization || opts.headers.authorization)) {
        return _origFetch(url, opts);
      }
      return window.vspAuthFetch(url, opts);
    }
    return _origFetch(url, opts);
  };
})();
</script>

<script>
var TOKEN='', API='';
var RUNS=[];

function sevPill(s){
  var m={CRITICAL:'pill-crit',HIGH:'pill-high',MEDIUM:'pill-med',LOW:'pill-low',INFO:'pill-low'};
  return '<span class="pill '+(m[s]||'')+'">'+s+'</span>';
}

function renderRows(items, tbodyId){
  var el=document.getElementById(tbodyId);
  if(!items||!items.length){el.innerHTML='<tr><td colspan="5" class="empty">No items</td></tr>';return;}
  el.innerHTML=items.map(function(i){
    var path=i.path||'';if(path.length>40)path='…'+path.slice(-38);
    var msg=i.message||'';if(msg.length>60)msg=msg.slice(0,58)+'…';
    return '<tr>'
      +'<td>'+sevPill(i.severity)+'</td>'
      +'<td style="font-family:var(--font-mono);font-size:10px;color:var(--t3)">'+i.tool+'</td>'
      +'<td style="font-family:var(--font-mono);font-size:10px;color:var(--cyan)">'+i.rule_id+'</td>'
      +'<td style="font-family:var(--font-mono);font-size:10px;color:var(--t2)">'+path+'</td>'
      +'<td style="font-size:11px;color:var(--t2)">'+msg+'</td>'
      +'</tr>';
  }).join('');
}

function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

async function loadRuns(){
  if(!TOKEN)return;
  try{
    var r=await fetch(API+'/api/v1/vsp/runs/index',{headers:{Authorization:'Bearer '+TOKEN}});
    var d=await r.json();
    RUNS=(d.runs||[]).slice(0,50);
    var opts=RUNS.map(function(r){
      var dt=r.started_at?new Date(r.started_at).toLocaleDateString('en-GB'):'';
      return '<option value="'+r.rid+'">'+r.rid.slice(-20)+' · '+r.mode+' · '+r.gate+' · '+dt+'</option>';
    }).join('');
    document.getElementById('rid1').innerHTML='<option value="">— select run —</option>'+opts;
    document.getElementById('rid2').innerHTML='<option value="">— select baseline —</option>'+opts;
    // Auto-select latest 2
    if(RUNS.length>=2){
      document.getElementById('rid1').value=RUNS[0].rid;
      document.getElementById('rid2').value=RUNS[1].rid;
      updateMeta();
    }
  }catch(e){console.error('loadRuns',e);}
}

function updateMeta(){
  ['rid1','rid2'].forEach(function(id,i){
    var val=document.getElementById(id).value;
    var run=RUNS.find(function(r){return r.rid===val;});
    var metaEl=document.getElementById('meta'+(i+1));
    if(run&&metaEl){
      metaEl.textContent=run.mode+' · '+run.gate+' · '+(run.total_findings||0)+' findings';
    }
  });
}

document.getElementById('rid1').addEventListener('change',updateMeta);
document.getElementById('rid2').addEventListener('change',updateMeta);

async function runDiff(){
  var rid1=document.getElementById('rid1').value;
  var rid2=document.getElementById('rid2').value;
  if(!rid1||!rid2){alert('Select two runs');return;}
  if(rid1===rid2){alert('Select different runs');return;}
  var hasUX = typeof VSPUXState !== 'undefined';
  if(hasUX){
    VSPUXState.skeleton('#tbl-new', {rows: 3});
    VSPUXState.skeleton('#tbl-fixed', {rows: 3});
    VSPUXState.skeleton('#tbl-persisted', {rows: 3});
  }
  var btn=document.getElementById('diff-btn');
  btn.textContent='Loading…';btn.disabled=true;
  try{
    var r=await fetch(API+'/api/v1/sbom/'+rid1+'/diff?compare='+rid2,
      {headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok){throw new Error('HTTP '+r.status);}
    var d=await r.json();
    var newItems=d['new']||[];
    var fixedItems=d.fixed||[];
    var persistedItems=d.persisted||[];
    var total=newItems.length+fixedItems.length+persistedItems.length;
    // KPIs
    document.getElementById('k-new').textContent=newItems.length;
    document.getElementById('k-fixed').textContent=fixedItems.length;
    document.getElementById('k-persisted').textContent=persistedItems.length;
    // Trend
    var trendEl=document.getElementById('k-trend');
    if(newItems.length>fixedItems.length){
      trendEl.textContent='↑ Worse';trendEl.className='kpi-val trend-up';
    }else if(fixedItems.length>newItems.length){
      trendEl.textContent='↓ Better';trendEl.className='kpi-val trend-down';
    }else{
      trendEl.textContent='→ Stable';trendEl.className='kpi-val trend-same';
    }
    // Tab counts
    document.getElementById('tc-new').textContent=newItems.length;
    document.getElementById('tc-fixed').textContent=fixedItems.length;
    document.getElementById('tc-persisted').textContent=persistedItems.length;
    // Tables — use VSPUXState.empty if section empty
    if(newItems.length===0 && hasUX) VSPUXState.empty('#tbl-new', 'No new findings', runDiff);
    else renderRows(newItems,'tbl-new');
    if(fixedItems.length===0 && hasUX) VSPUXState.empty('#tbl-fixed', 'No findings fixed', runDiff);
    else renderRows(fixedItems,'tbl-fixed');
    if(persistedItems.length===0 && hasUX) VSPUXState.empty('#tbl-persisted', 'No persistent findings', runDiff);
    else renderRows(persistedItems,'tbl-persisted');
    // Show
    document.getElementById('kpi-row').style.display='';
    document.getElementById('tabs').style.display='';
  }catch(e){
    if(hasUX){
      VSPUXState.error('#tbl-new', 'Diff failed: '+e.message, runDiff);
      VSPUXState.error('#tbl-fixed', 'Diff failed: '+e.message, runDiff);
      VSPUXState.error('#tbl-persisted', 'Diff failed: '+e.message, runDiff);
    } else {
      alert('Diff failed: '+e.message);
    }
  }finally{
    btn.textContent='Compare ↗';btn.disabled=false;
  }
}

// Token from parent iframe
function _init(tk){
  TOKEN=tk;
  API=window.location.origin==='null'?'':window.location.origin;
  loadRuns();
}
window.addEventListener('message', function(e) {
  if (!window.VSPOrigin.check(e)) return;
  if(e.data&&e.data.type==='vsp:token')_init(e.data.token);
});
if(window.parent!==window){
  window.parent.postMessage({type:'vsp:request_token'}, window.location.origin);
}else{
  // Standalone dev — try localStorage
  var tk=localStorage.getItem('vsp_token')||'';
  if(tk)_init(tk);
}
</script>

  // ─── Filter bar ──────────────────────────────────────────────────────────
  function injectFilterBar(container, filters, onChange) {
    if (!container) return null;
    if (container.querySelector('.vsp-uni3-filter')) return container.querySelector('.vsp-uni3-filter');
    const bar = document.createElement('div');
    bar.className = 'vsp-uni3-filter';
    bar.style.cssText = 'display:flex;gap:6px;align-items:center;padding:10px 12px 0;flex-wrap:wrap;font-size:11px';
    bar.innerHTML = ''
      + (filters.search !== false
          ? '<input aria-label="Search filter" class="vsp-uni3-q" placeholder="' + esc(filters.searchPlaceholder || 'Search…') + '" style="font-size:11px;padding:5px 10px;flex:1;min-width:200px;background:var(--bg1,#111);border:1px solid var(--bd,#27272a);color:var(--t1,#e5e7eb);border-radius:4px">' : '')
      + (filters.pills ? renderPillGroup(filters.pills) : '')
      + (filters.csv !== false
          ? '<button class="btn btn-sm vsp-uni3-csv" style="font-size:10px">↓ CSV</button>' : '')
      + '<span class="vsp-uni3-count" style="margin-left:auto;font-size:10px;color:var(--t3)"></span>';
    container.insertBefore(bar, container.firstChild);

    if (!$id('vsp-uni3-pill-css')) {
      const css = document.createElement('style'); css.id = 'vsp-uni3-pill-css';
      css.textContent = '.vsp-uni3-pill{background:transparent;border:0;padding:5px 9px;font-size:10px;font-weight:500;cursor:pointer;border-radius:3px;color:var(--t2,#a1a1aa);font-family:inherit}.vsp-uni3-pill:hover{color:var(--t1,#e5e7eb)}.vsp-uni3-pill-active{background:var(--bg2,#1c1c1c);color:var(--t1,#e5e7eb)!important}';
      document.head.appendChild(css);
    }
    const q = bar.querySelector('.vsp-uni3-q');
    const csvBtn = bar.querySelector('.vsp-uni3-csv');
    if (q) q.addEventListener('input', () => onChange(getFilterState(bar)));
    bar.querySelectorAll('.vsp-uni3-pill').forEach(p => {
      p.addEventListener('click', () => {
        bar.querySelectorAll('.vsp-uni3-pill[data-group="' + p.dataset.group + '"]').forEach(x => x.classList.remove('vsp-uni3-pill-active'));
        p.classList.add('vsp-uni3-pill-active');
        onChange(getFilterState(bar));
      });
    });
    if (csvBtn && filters.onCSV) csvBtn.addEventListener('click', filters.onCSV);
    return bar;
  }
  function renderPillGroup(groups) {
    return groups.map(g => '<div style="display:flex;gap:4px;background:var(--bg1,#111);padding:3px;border-radius:4px">'
      + g.options.map((o, i) => `<button class="vsp-uni3-pill ${i === 0 ? 'vsp-uni3-pill-active' : ''}" data-group="${esc(g.key)}" data-value="${esc(o.value || '')}" style="${o.color ? 'color:' + o.color : ''}">${esc(o.label)}</button>`).join('')
      + '</div>').join('');
  }
  function getFilterState(bar) {
    const state = { q: '' };
    const q = bar.querySelector('.vsp-uni3-q');
    if (q) state.q = (q.value || '').toLowerCase();
    bar.querySelectorAll('.vsp-uni3-pill-active').forEach(p => state[p.dataset.group] = p.dataset.value || '');
    return state;
  }
  function tableToCSV(table) {
    if (!table) return '';
    const rows = [];
    table.querySelectorAll('thead tr').forEach(tr => rows.push(Array.from(tr.querySelectorAll('th,td')).map(c => '"' + (c.textContent || '').trim().replace(/"/g, '""').replace(/\s+/g, ' ') + '"').join(',')));
    table.querySelectorAll('tbody tr').forEach(tr => { if (tr.style.display === 'none') return; rows.push(Array.from(tr.querySelectorAll('td')).map(c => '"' + (c.textContent || '').trim().replace(/"/g, '""').replace(/\s+/g, ' ') + '"').join(',')); });
    return rows.join('\n');
  }
  function applyFilters(state) {
    $$('table').forEach(tbl => {
      const rows = tbl.querySelectorAll('tbody tr');
      let shown = 0;
      rows.forEach(tr => {
        const text = (tr.textContent || '').toLowerCase();
        let ok = true;
        if (state.q && text.indexOf(state.q) < 0) ok = false;
        for (const k of Object.keys(state)) {
          if (k === 'q' || !state[k]) continue;
          if (text.indexOf(state[k].toLowerCase()) < 0) ok = false;
        }
        tr.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      const card = tbl.closest('div[class*="card"]') || tbl.parentNode;
      const counter = card && card.querySelector('.vsp-uni3-count');
      if (counter) counter.textContent = shown + ' / ' + rows.length + ' rows';
    });
  }
  function injectGenericFilter(searchPlaceholder, pills, csvName) {
    $$('table').forEach(tbl => {
      const card = tbl.closest('div[class*="card"]') || tbl.parentNode;
      if (!card || card.querySelector('.vsp-uni3-filter')) return;
      injectFilterBar(card, {
        searchPlaceholder: searchPlaceholder, pills: pills,
        onCSV: () => { downloadFile((csvName || 'export') + '-' + Date.now() + '.csv', tableToCSV(tbl), 'text/csv'); toast('Exported CSV', 'success'); }
      }, applyFilters);
    });
  }
  function makeKPIsClickable(handler) {
    $$('div[class*="kpi"]').forEach(card => {
      if (card.dataset.vspPol) return;
      card.dataset.vspPol = '1';
      card.style.cursor = 'pointer';
      card.title = 'Click for breakdown';
      card.onclick = () => handler(card);

  }
  function kbox(label, val, color, sub) {
    return '<div style="background:var(--bg1,#111);border-left:3px solid ' + color + ';border-radius:4px;padding:10px 12px">'
      + '<div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">' + esc(label) + '</div>'

      + (sub ? '<div style="font-size:10px;color:var(--t3);margin-top:2px">' + esc(sub) + '</div>' : '')
      + '</div>';
  }
  function infoBanner(color, title, html) {

    }, 600);
  }

  // ─── PANEL: network_flow ─────────────────────────────────────────────────
  function initNetworkFlow() {
    setTimeout(() => {
      injectGenericFilter('Search src / dst IP / port / protocol…', [{
        key: 'proto',
        options: [
          { label: 'All', value: '' },
          { label: 'TCP', value: 'tcp', color: '#3b82f6' },
          { label: 'UDP', value: 'udp', color: '#a855f7' },
          { label: 'ICMP', value: 'icmp', color: '#f59e0b' }
        ]
      }], 'network-flows');

      const main = $('main') || $('.main') || document.body;
      if (main && !$id('vsp-net-banner')) {
        const banner = document.createElement('div');
        banner.id = 'vsp-net-banner';
        banner.innerHTML = infoBanner('#06b6d4', '🌐 Network Flow Analysis — NDR',
          'NetFlow/IPFIX-style network detection & response. Detects: <b>data exfil</b>, <b>C2 beaconing</b>, <b>lateral movement</b>, <b>port scans</b>. Per <b>NIST SP 800-94</b>.');
        const target = main.querySelector('div');
        if (target) target.parentNode.insertBefore(banner, target);
      }
    }, 600);
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────
  function addToolbarButton(label, handler) {
    // Find header/toolbar location
    const headers = $$('h1, h2, .header, [class*="title"]').slice(0, 1);
    if (headers.length === 0) return;
    const header = headers[0];
    if (header.dataset.vspBtn) return;
    header.dataset.vspBtn = '1';
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.style.cssText = 'font-size:10px;margin-left:10px;background:var(--bg1,#111);border:1px solid var(--bd);color:var(--t1);padding:5px 10px;border-radius:4px;cursor:pointer';
    btn.textContent = label;
    btn.onclick = handler;
    header.appendChild(btn);
  }

  // ─── Init dispatch ───────────────────────────────────────────────────────
  let _initDone = false;
  function init() {
    if (_initDone) return;
    _initDone = true;
    if (PANEL === 'ai_advisor')         initAIAdvisor();
    else if (PANEL === 'ai_analyst')    initAIAnalyst();
    else if (PANEL === 'cicd')          initCICD();
    else if (PANEL === 'cmmc')          initCMMC();
    else if (PANEL === 'samm')          initSAMM();
    else if (PANEL === 'sbom_diff')     initSBOMDiff();
    else if (PANEL === 'software_risk') initSoftwareRisk();
    else if (PANEL === 'scheduler')     initScheduler();
    else if (PANEL === 'network_flow')  initNetworkFlow();
  }
  if (document.readyState !== 'loading') setTimeout(init, 800);
  else document.addEventListener('DOMContentLoaded', () => setTimeout(init, 800));

  let pollCount = 0;
  const poll = setInterval(() => { init(); if (++pollCount > 4) clearInterval(poll); }, 1500);
})();

</script>
<!-- VSP-UNI3-POLISH-END -->
</body>
</html>
