# .golangci.yml — VSP Security Platform
#
# Last updated: 2026-04-20 (Sprint 3.5 hygiene)
# Expanded from 6 → 18 linters to align with DSOMM Level 3.5 Static Analysis.
#
# Design principles:
# 1. Security linters (gosec, bodyclose, sqlclosecheck) enabled — VSP sells
#    security scanning, so VSP's own code must pass these.
# 2. gosec annotations inline via //#nosec G304 -- reason, not blanket excludes.
# 3. Quality linters (gocyclo, dupl, revive) enabled at pragmatic thresholds
#    to avoid noise on existing code.
# 4. Complexity thresholds sized for VSP's existing code — tighten later.

run:
  go: "1.25"
  timeout: 10m
  # Note: skip-dirs/skip-files moved to issues.exclude-dirs/exclude-files
  # in golangci-lint v2+ (deprecation warning). Using new location below.

linters:
  enable:
    # ── Existing (keep) ──
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign

    # ── Security (NEW — critical for VSP) ──
    - gosec              # SAST — paired with inline //#nosec annotations
    - bodyclose          # HTTP response.Body.Close() — VSP has many HTTP clients
    - sqlclosecheck      # rows.Close() + stmt.Close() — VSP has DB layer
    - rowserrcheck       # rows.Err() after iteration — correctness
    - noctx              # HTTP request without context — timeout leak

    # ── Correctness (NEW) ──
    - errorlint          # Go 1.13+ error wrapping (errors.Is / As)
    - contextcheck       # context propagation (multi-tenant requires it)
    - nilerr             # return nil error when err != nil (logic bug)
    - wastedassign       # dead assignments
    - exhaustive         # switch on enum must cover all cases (severity, status)

    # ── Quality (NEW — pragmatic) ──
    - gocritic           # code quality checks (opinions disabled below)
    - misspell           # typos in comments & strings
    - unconvert          # unnecessary type conversions
    - unparam            # unused function parameters
    - prealloc           # slice preallocation hints

  disable:
    - depguard           # already disabled; keep
    - gochecknoglobals   # VSP uses globals for config (acceptable)
    - gochecknoinits     # VSP uses init() for route registration (acceptable)
    - exhaustruct        # noisy for existing structs
    - gci                # gofumpt handles imports
    - wsl                # whitespace linter too opinionated

linters-settings:
  # ── errcheck — existing excludes + new ones ──
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - fmt.Fprintf
      - fmt.Fprintln
      - (net/http.ResponseWriter).Write

  # ── gosec — fail on HIGH only, triage MEDIUM inline ──
  gosec:
    severity: medium
    confidence: medium
    excludes:
      # Excluded with justification (see docs/SECURITY_DECISIONS.md):
      - G204  # Subprocess launched with variable — VSP scanner core feature (SD-0042)
      - G304  # File path from user input — VSP scans user files (SD-0043)
      - G703  # File inclusion via variable — same as G304 (SD-0043)
      - G307  # Deferred Close() — low impact, inline-annotated where matters
    config:
      G101:
        pattern: "(?i)(password|passwd|secret|token|apikey|api_key|private_key)"
        ignore_entropy: false
        entropy_threshold: "80.0"
        per_char_threshold: "3.0"
        truncate: "32"

  # ── gocritic — enable most, disable opinions that conflict with VSP style ──
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
    disabled-checks:
      - unnamedResult    # VSP returns (x, y) without names often
      - commentedOutCode # VSP keeps commented code for rollback
      - whyNoLint        # we document //nolint inline; tag on separate line

  # ── gocyclo — complexity threshold (start forgiving, tighten later) ──
  gocyclo:
    min-complexity: 20

  # ── exhaustive — enum switch coverage ──
  exhaustive:
    default-signifies-exhaustive: true  # default: case counts as covered

  # ── misspell — US English ──
  misspell:
    locale: US
    ignore-words:
      - vsp
      - fedramp
      - oscal
      - cmmc
      - soar
      - siem
      - ueba

issues:
  # ── NEW location for skip-dirs/files (v2+ replaces run.skip-dirs) ──
  exclude-dirs:
    - internal/migrate/sql
    - scripts/archive
    - vendor
  exclude-files:
    - ".*\\.bak.*$"
    - ".*_gen\\.go$"
    - ".*\\.pb\\.go$"

  # ── Max issues per linter per run (0 = unlimited) ──
  max-issues-per-linter: 0
  max-same-issues: 0

  # ── Exclude test files from some linters ──
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec        # test fixtures may have demo secrets
        - errcheck     # test cleanup doesn't need err check
        - bodyclose    # httptest.Server tests don't need body close
        - gocyclo      # table-driven tests can be long

    - path: internal/migrate/
      linters:
        - gosec        # migration SQL can't be parameterized

    - path: cmd/
      linters:
        - gochecknoinits  # cmd uses init() for flag registration

  # ── New from VCS only (incremental adoption) ──
  # Uncomment when integrating to avoid swamping PR with legacy issues:
  # new-from-rev: main
