# ============================================================
# VSP Production NGINX Config
# Save as: /etc/nginx/sites-available/vsp
# Enable: ln -s /etc/nginx/sites-available/vsp /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d yourdomain.com
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=vsp_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=vsp_p4:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=vsp_login:10m rate=5r/m;

# Upstream backends
upstream vsp_gateway {
    server 127.0.0.1:8921;
    keepalive 32;
}

upstream vsp_shell {
    server 127.0.0.1:8922;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by certbot
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logging
    access_log /var/log/nginx/vsp-access.log combined;
    error_log /var/log/nginx/vsp-error.log warn;

    # Request size limits
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── Landing, Onboarding, Admin, Docs → soc-shell ──────
    location ~ ^/(landing|onboarding|admin|docs|p4|static) {
        limit_req zone=vsp_p4 burst=20 nodelay;

        proxy_pass http://vsp_shell;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Cache static assets
        location ~* \.(js|css|png|jpg|ico|woff2)$ {
            proxy_pass http://vsp_shell;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── P4 API → gateway ──────────────────────────────────
    location /api/p4/ {
        limit_req zone=vsp_api burst=10 nodelay;

        proxy_pass http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS for API
        add_header Access-Control-Allow-Origin "https://yourdomain.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://yourdomain.com";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
    }

    # ── Auth endpoint (strict rate limit) ─────────────────
    location /api/v1/auth/login {
        limit_req zone=vsp_login burst=3 nodelay;
        proxy_pass http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── VSP main API → gateway ─────────────────────────────
    location /api/ {
        limit_req zone=vsp_api burst=30 nodelay;

        proxy_pass http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Root → landing page ────────────────────────────────
    location / {
        proxy_pass http://vsp_shell;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Block sensitive paths ──────────────────────────────
    location ~ /\.(env|git|htaccess) { deny all; return 404; }
    location ~ /(config|\.ssh) { deny all; return 404; }
}

# API subdomain (optional) — api.yourdomain.com
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        limit_req zone=vsp_api burst=20 nodelay;
        proxy_pass http://vsp_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
    }
}
